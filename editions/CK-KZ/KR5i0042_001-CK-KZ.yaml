body:
  text: 化書化書新聲序孔子曰知變化之道者其知神之所爲乎夫物胡以變而又胡以化皆誠之爲也誠自神神自化唯天下至誠爲能化惟誠通虛實貫有無誠於虛虛則自無情而之有情矣誠於實實則自有情而之無情矣有情無情者類皆能化而况人爲萬物之靈戴天履地豈獨滯於形骸之末而不能化乎哉若莊生之夢蝴蝶望帝之托杜鵑此其大覩矣果能由誠以知神由神以知化則出有入無升沉自我能使水不濡火不𤍠虎可馴龍可豢將不得爲飛仙以遨遊乎故曰一誠立而天地之道備是矣予亦曰一誠立而神仙之術備是矣譚子作化書王君作化書新聲譚肇其始王衍其流譚君知化王君翼化二君其先後一轍者夫吳之鵬序
