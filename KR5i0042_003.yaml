body:
  text: 化書晉紫霄眞人譚景升著明體物子王一淸註道化道之委也虛化神神化氣氣化形形生而萬物所以塞也道之用也形化氣氣化神神化虛虛明而萬物所以通也是以古聖人窮通塞之端而得造化之源忘形以養氣忘氣以養神忘神以養虛虛實相通是謂大同故藏之爲元精用之爲萬靈含之爲太一放之爲太淸是以坎離消長於一身風雲發洩於七竅眞氣薰蒸而時無寒暑純陽流注而民無死生是謂神化之道委者降而運也由太虛運而化神神化變動運而化氣神氣妙合運而化形形氣相感而生萬物塞乎天地之間此言順而生物之謂也用者冲而和也由形冲和而化氣氣聚意定和而化神神氣混合和而化虛虛和通化返還混沌之先此言逆而還元之謂也是以古之聖人窮通塞之端而得造化之源也自無而有謂之造而塞也自有歸無謂之化而通也端源者謂無極也先天也未生前也恍惚𣺌漠有而無形自然之妙也是以師眞教人法大道自然之妙忘形以養氣忘氣以養神忘神以養虛至虛眞妙澹然無爲而神氣自然變化於其中故能超出於形氣之表復乎溟涬之先也虛實者虛謂幻虛之色身實謂無相之實相也相通者謂眞幻原非二體同出之於一源而無所不同謂之大同也故藏之於身則爲元精用之於外則爲萬靈含之於心則爲太一散之於空則爲太淸斯法身實相異名也坎離消長於一身風雲發洩於七竅者坎者陰中之陽喻吾身之眞陽也離者陽中之陰喻吾身之眞陰也風者陽之爲也雲者陰之爲也消長卽升降也言人一身之中升而爲陽降而爲陰散之於百骸發之於七竅斯色身妙相之化通也如若神風不出於身中氣雲不洩於七竅自然眞氣薰蒸遍體皆陽春何寒暑之有也羣陰剝盡色身卽法身渾身皆純陽流注何死生之有也此乃虛心鍊神金液還丹之道也蛇雀蛇化爲龜雀化爲蛤彼忽然忘其屈曲之狀而得蹣跚之質此倐然失其飛鳴之態而得介甲之體斵削不能加其功繩尺不能定其象何化之速也且夫當空團塊見塊而不見空粉塊求空見空而不見塊形無妨而人自妨之物無滯而人自滯之悲哉大腰無雄龜鼉之類是也龜與蛇交而生蛇久復化爲龜月令記五月雀入大水化爲蛤彼蛇忽然忘其屈曲之狀遽成蹣跚之質此雀倐然失其飛鳴之態遂成介甲之形而其變化之質有天然之妙雖良工斵削繩尺規模莫能肖其巧也須臾而變何神速如此哉曰非也蓋其神識精思之有日時至形化性使之然也觀夫擲塊當空惟見其塊而不見其空何也蓋喻人被幻形所梏惟知虛幻而不知有實相也其塊粉矣無形質之隔礙所以見空而不見塊也此言人能忘形去累依然現出妙相法身則不被幻形之所梏矣所謂虛空粉碎方露眞詮是也若夫貴身者妨其形也貪欲者滯於物也可不悲哉此章之意蓋言以蛇雀之微尚能變化易形而人爲萬物之靈豈不能忘身形返神而仙乎但人妨於形氣之私滯於物欲之蔽是以難能也老楓老楓化爲羽人朽麥化爲蝴蝶自無情而之有情也賢女化爲貞石山蚯化爲百合自有情而之無情也是故土木金石皆有性情魂魄虛無所不至神無所不通氣無所不同形無所不類孰爲彼孰爲此孰爲有識孰爲無識萬物一物也萬神一神也斯道之至矣土木金石皆有性情魂魄而無識惟有血氣者有識老楓朽麥無情之物也忽化爲有情有識之羽人之蝴蝶賢女山蚯有情之物也忽化爲無情無識之貞石之百合何其怪也曰無怪也萬物均得天地之理以生均得天地之氣以成然吾與天地萬物叢然蔚然塞乎太虛之中本同一體也而吾之神卽天地萬物之神吾之氣卽天地萬物之氣也吾之精吾之魄卽天地萬物之精魄也吾旣與天地萬物爲一本又何分别彼此之間哉彼無情化而爲有情者蓋其得有情之靈氣忽然化也此有情化而爲無情者爲其感無情之精魄遽然化也譬如朽爪爲魚腐草成螢糞丸生蝡白人血化野火后稷生於巨跡伊尹生於空桑物之感氣而變化亦無足怪也故知天地萬物自一體出而物卽我也我卽物也孰爲有識也孰爲無識也萬物一物也萬神一神也萬氣一氣也萬形一形也無一物不在太虛之中又何分别彼此之間哉知夫無分别無彼此無物我者得其一也一者道之至也耳目目所不見設明鏡而見之耳所不聞設虛氣而聞之精神在我視聽在彼跰趾可以割䧟吻可以補則是耳目可以虛設形容可以僞置旣假又假旣惑又惑所以知魂魄魅我血氣醉我七竅囚我五根役我惟神之有形由形之有疣苟無其疣何所不可目能見物而不能自見必待明鏡然後見之耳能聽物而不能自聽必待聲音然後聞之其見聞者雖在我視聽者待物而有故曰精神在我視聽在彼是以知其見聞者不在耳目而在我矣故曰耳目可以虛設也跰趾一也可割爲二䧟吻缺也可補而全是以知其形容可以僞置也形旣假矣而又剖之補之則是假之又假惑之又惑蓋其不知眞我之義也若能知其眞我者則其魂魄血氣七竅五根俱是幻假其惑滅矣彼何能魅我醉我囚我役我哉故知形者神合氣而成故曰惟神之有形也有形則有患故曰由形之有疣也苟能忘形何患之有也苟無其疣何所不可也環舞作環舞者宫室皆轉瞰迴流者頭目自旋非宫室之幻惑也而人自惑之非迴流之改變也而人自變之是故粉巾爲兎藥石爲馬而人不疑甘言巧笑圖臉畫眉而人不知惟淸靜者物不能欺環舞者旋身而舞也旋久則宫室皆轉而宫室未嘗轉非宫室之幻惑而人自惑之也瞰視也瞰迴流者視久頭目自旋而頭目未嘗旋非頭目之改變人自變之也粉巾者白巾也結巾爲兎以藥石爲馬可使之馳可使之走術士之假也人皆信之而不疑甘其言巧其笑粉其貌畫其眉致飾於外取媚於人樂人之假也人皆迷之而不覺惟淸靜其心者術士莫能惑樂人莫能欺也鉛丹術有火鍊鉛丹以代穀食者其必然也然𡻕豐則能飽𡻕歉則能饑是非丹之恩蓋由人之誠也則是我本不饑而自饑之我本不飽而自飽之饑者大妄飽者大幻蓋不齊其道也故人能一有無一生死一性情一内外則可以蛻五行脫三光何患乎一日百食百日一食術謂還丹之術也火喻神鉛喻氣也鍊者如所謂以神馭氣也以代穀食者如所謂服元和除五谷是也豐年有食謂神氣全故曰飽也歉年無食謂神氣微故曰饑也服元和能令人不饑者由一念之精專以養其元和氣全不思食所以不饑也則是我本不饑而人自饑之也丹者純粹太和之氣耳豈能飽人乎則是我本不飽而人自飽之也故知饑者大妄飽者大幻也然人不明此道故有饑飽之幻妄蓋其未能與道合眞之意也若能以有無爲一死生爲一性情爲一内外爲一者與道冥契又何幻妄之有也吁得之者則能超出五行之外而下視三光雖一日百食不加飽百日一食不加饑也形影以一鏡照形以餘鏡照影鏡鏡相照影影相傳不變衣冠之狀不奪黼黻之色是形也與影無殊是影也與形無異乃知形以非實影以非虛無實無虛可與道俱用一鏡照形而鏡中生影以餘鏡照鏡中之影而鏡鏡生一影謂之鏡鏡相照影影相傳也然彼鏡中之影冠劒黼黻之狀不異彼鏡中冠劒黼黻之形斯形也與影無殊斯影也與形無異人惟知以形爲實有以影爲虛無殊不知形亦幻矣雖生百年終期於盡而形亦爲虛故曰形以非實也影雖虛也以鏡臨之其迹儼然而冠劒黼黻之狀不差毫末旣然有迹而影亦爲有故曰影以非虛也其若以形爲有則着於相以影爲無則落於空故知形非其實影非其虛也夫道本無形而非實也無中有靈亦非虛也知夫非實非虛者則能圓證眞常與道同遊也蟄藏物有善於蟄藏者或可以禦大寒或可以去大饑或可以萬𡻕不死以其心冥冥兮無所知神怡怡兮無所之氣熙熙兮無所爲萬慮不能惑求死不可得是以大人體物知身體身知神體神知眞是謂吉人之津蟄者和集也此章言人能安心於虛置身於靜自然神集氣和以復其命矣龍蛇善於蟄藏故能禦大寒而不饑可以萬𡻕不死而龍能飛騰蛇能變化皆蟄使然也如其不蟄以斂其神伏其氣彼能飛騰變化哉如言昆蟲不蟄不能奮揚木不斂津豈能條暢是也觀其蟄之時也而其心冥冥然忘其身而無知而其神怡怡然交其氣而無思而其氣熙熙然和其神而無爲萬慮俱澄一心内鍊神不出身其能死乎是謂求死不可得也大人者謂有道之人也有道之士純一無雜不識不知體龍蛇之蟄藏而得夫修鍊之要篤於淵靜以和其氣極於致虛以集其神又從而體之全其身者莫若全其神神者我之眞乃所謂性也吉人者謂學道之人也言學道之人若知其龍蛇蟄藏之法則可以爲内鍊之津梁登眞之梯階也易曰龍蛇之蟄以藏身也精義入神以致用也梟雞梟夜明而晝昬雞晝明而夜昬其異同也如是或謂梟爲異則謂雞爲同或謂雞爲異則謂梟爲同孰梟雞之異晝夜乎晝夜之異梟雞乎孰晝夜之同梟雞乎梟雞之同晝夜乎夫耳中磬我自聞目中花我自見我之晝夜彼之晝夜則是晝不得謂之明夜不得謂之昬能齊昬明者其惟大人乎梟晝昬而夜明雞夜昬而晝明或曰二者均得天地之氣以生何如是之同異曰皆稟性使然耳或謂晝明夜昬得天地之常雞當爲同而梟當爲異也或謂以梟之稟性返而觀之而梟之夜卽雞之晝而理亦同如是則梟雞同而晝夜不異矣其意蓋謂晝夜本不異而梟雞異之梟雞本不同而稟性同之若以稟性論之則無同異矣譬如耳中之聲自然聞之目中之花自然見之故知梟之晝卽雞之夜雞之夜卽梟之晝乃物性自然耳若以梟而論之晝不得謂之明夜不得謂之昬以雞而論之晝不得謂之昬夜不得謂之明也若能以昬明晝夜而爲一者惟有道之士知物性之自然又何惑之有也四鏡小人常有四鏡一名圭一名珠一名砥一名盂圭視者大珠視者小砥視者正盂視者倒觀彼諸器察我之形由是無大小無短長無妍醜無美惡所以知形氣謟我精魄賊我奸臣貴我禮樂尊我是故心不得爲之君王不得爲之主戒之如火防之如虎純儉不可襲淸靜不可侮然後跡容廣而躋三五鏡喻見也小人有四鏡者謂小人之見多分別之意也圭王者執喻見大也珠圓而小喻見小也砥平直喻見正也盂欹側喻見邪也觀彼諸器正如小人之見有如此大小正邪之不同也反而察之我形則未嘗有如此異耳由是知之道一而已矣無有大小無有長短無有妍醜無有美惡也所以知其形氣謟我以驕淫而喪我元靈精魄生我之情妄戕我之眞性奸臣外雖媚順而貴我心常懷不道如禮樂維持教化而尊我喪我之純樸蹈之者蓋其心無主宰故曰心不得爲之君也如王者被奸臣䝉蔽不能主之也數者溺人有如此之密可不戒哉學者當愼之如火之焚我防之如虎之噬我則不被驕淫所喪情妄所戕奸臣不能蔽其主禮樂不能喪其湻蓋以吾之眞心本來純素本來淸靜所以驕淫不能襲情妄不能侮故可以追跡容成廣成二老仙遨遊於神霄碧落之中超出於三光五行之外矣射虎射似虎者見虎而不見石斬暴蛟者見蛟而不見水是知萬物可以虛我身可以無以我之無合彼之虛自然可以隱可以顯可以死可以生而無所拘夫空中之塵若飛雪而目未嘗見穴中之蟻若牛鬪而耳未嘗聞况非見聞者乎射似虎者如李廣然射虎而矢貫其石當其射之時也惟見似虎而不見石故能貫之而無礙若只見石其能貫之也乎斬暴蛟者如周處然投水撲殺蛟當其殺蛟之時也奮志在蛟而不見水所以入水而不溺若只見水其能入之也乎或問二子有術乎曰非也其人一念之誠心專志一皆神之所爲也噫夫人一念之誠神異尚能若是何况有道者乎或謂石之堅也矢能貫之乎水之溺也人能入之乎曰匪人也神也神本至虛而物莫能礙故可以入金石神本至無而水莫能溺故可以席蛟龍由是觀之萬物可以虛幻形可以無而其所謂貫金石入水火者以我之無入彼之虛也心印經云神能入石神能飛形入水不溺入火不焚是也可以隱者苟吾之心一念不萌雖鬼神之靈亦不能覔我之蹤跡也可以顯者乃我之神靈妙無方變化倐忽無所不通無所不至故能貫金石入水火命風雷救旱澇逐瘟蝗度苦爽斬精邪療疾病住世延年超凡入聖斯皆吾心之功用所謂顯諸仁也可以死者身沒而道存也可以生者守吾神存吾氣求死不可得也夫如是則生如寄死如蛻而無所拘又何生死之繫累也或問空中塵若飛雪曰日光射隙中見之者是也或問螻蟻何謂似牛鬬曰螻蟻雖微而其鬬志未嘗不與牛同也夫空中之塵若飛雪有氤氲交密之狀而人莫能見穴中之蟻如牛鬬有喧轟嚷閙之聲而人莫能聞言此二物雖微尚有見尚有聞而人猶莫能見莫能聞何况無見無聞者而人能見聞乎龍虎龍化虎變可以蹈虛空虛空非無也可以貫金石金石非有也有無相通物我相同其生非始其死非終知此道者形不可得斃神不可得逝易曰知變化之道者其知神之所爲乎此章言造道之士神化氣變如龍之靈如虎之猛如言聖人龍之道雖虎變是也知變化之道者故可以蹈空虛入金石其豈虛言哉有至妙存焉耳竊嘗思之虛空無也神妙蹈之而不墜虛空不得謂之無金石有也神妙入之而無礙金石不得謂之有蓋以虛空金石本同一體而吾之神與天地萬物之神吾之氣與天地萬物之氣其本同也物旣與我同根則無不通無不同也妙矣哉合而言之一眞也分而言之性命也元神也元氣也謂之妙相法身也然此妙相法身先天地以常存後天地而不滅生非其始死非其終故知生如行人死如歸人一氣往來耳由是知之吾之妙相法身則未嘗生未嘗化也達斯理者虛心以全其神形不可得而斃也忘形以全其眞神不可得而逝也逰雲逰雲無質故五色含焉明鏡無瑕故萬象生焉謂水之含天也必天之含水也夫百步之外鏡則見人人不見影斯爲驗也是以太虛之中無所不有萬耀之内無所不見而世人且知心仰寥廓而不知跡處虛空寥廓無所間神明且不遠是以君子常正其心常儼其容則可以逰泳於寥廓交友於神明而無咎也逰雲無質所以運變五色也明鏡無瑕故能照見萬象也人見海水茫茫而含天孰不知水在天之中必天而含水也若夫百步之外鏡能照人而人不能見其影者目力所不及也言人能見其近而不能見其遠見其小而不能見其大見其有形而不能見其無形之意也由是知之徧虛空中無物不有無所不在也萬光之中無所不明無所不見也寥廓者大無邊際也世之人惟知心仰寥廓之高遠爲不可企及殊不知吾之形迹雖然𣺌然處於天地間而吾之眞吾之靈則與寥廓同其體故知徧虛空中神明洋洋乎如在吾之左右而不遠也是以君子敬天崇道常正其心而不敢妄知常儼其容而不敢妄爲蓋爲寥廓無所間神明且不遠也達斯理者可以逰泳於寥廓之鄉與神明合其德又何咎之有也嚥有言臭腐之狀則輒有所聞珍羞之名則妄有所嚥臭腐了然虛珍羞必然無而不能止嚥不能已有懼菽醬若蝤蠐者有愛鮑魚若鳳膏者知此理者可以齊奢儉外榮辱黜是非忘禍福或聞言臭腐之狀而心惡之輒有所焉或聞言珍羞之饌而心欲之輒有所嚥焉雖聞臭腐了然未嘗見雖聞珍羞必然未嘗有而其不能止嚥不能已足見貪欲嗜味之情人之所同也或有以菽醬之美而爲蝤蠐之惡或有以鮑魚之臭而爲鳳膏之馨此僻士矯情好奇之態人之所獨也二者皆不得中其若聞臭腐而不聞珍羞而不嚥美者馨者而不知好臭者腐者而不知惡惟有道者夫有道之士忘味斷緣居富貴而不驕淫處貧賤而不卑屈寵已不足榮辱已不足恥是非不入於胸臆得失不介於身心故足以黜是非忘禍福此上士之所爲樂道之眞然非下士所能及也大化虛化神神化氣氣化形形化精精化顧眄顧眄化揖讓揖讓化升降升降化尊卑尊卑化分别分别化冠冕冠冕化車輅車輅化宮室宮室化掖衞掖衞化燕享燕享化奢蕩奢蕩化聚斂聚斂化欺罔欺罔化刑戮刑戮化悖亂悖亂化甲兵甲兵化爭奪爭奪化敗亡其來也勢不可遏其去也力不可拔是以大人以道德游泳之以仁義漁獵之以刑禮籠罩之蓋保其國家而護其富貴者也故道德有所不實仁義有所不至刑禮有所不足是教民爲奸詐使民爲邪淫化民爲悖亂驅民爲盜賊上昬昬然不知其弊下恍恍然不知其病其何以救之哉溟涬之中混混沌沌二氣未分五行未立名曰太虛太虛自然運動化神神立運變化而爲氣神氣妙合和而化形形生體立魄成化精精氣運動化爲顧眄顧眄中禮化爲揖讓揖讓進退化爲升降升降高下化爲尊卑尊卑大小化爲分别分别貴賤化爲冠冕冠冕尊榮化爲車輅車輅貴顯化爲宮室宮室重大化爲掖衞掖衞功勳化爲燕享燕享豐盛化爲奢蕩奢蕩費財化爲聚斂聚斂蠧民化爲欺罔欺罔酷虐化爲刑戮刑戮慘毒化爲悖亂悖亂好殺化爲甲兵甲兵謀叛化爲爭奪爭奪勝負化爲敗亡此言大道之降世道有爲皆自然而然也其化也不得不化故曰其來也勢不可遏雖欲去之不可得也故曰其去也力不可拔是以有道之君不以富貴爲得志冠冕爲尊榮車輅爲貴顯宫室爲重大惟以道德爲侍衞仁義爲隄防故不用掖衞以防害無功勳之賞無燕享之費是以不用財不斂民而民亦安其分樂其業故無欺罔蠧國酷民之臣則刑戮無所用悖亂無由起有何甲兵爭奪之事故足以安大寶守神器以治其國保其民然後可以安享其富貴也如若口談道德心有所不實假行仁義恩有所不至刑法之不明禮樂之不足則是以詐僞教其民而民亦以詐僞成風故有淫邪悖亂之害有國者不可以不愼也斯害也然由在上之人昬昬然不明去誠用智以滋其弊遂使下民翕然成風以致於傾其家敗其國有自來矣其何以救之哉正一世人皆知莧葅可以剖鱉而不知朱草可以剖人小人由是知神可以分氣可以泮形可以散散而爲萬不謂不足聚而爲一不謂有餘若狂風飄髮魂魄夢飛屐齒斷蚓首尾皆動夫何故太虛一虛也太神一神也太氣一氣也太形一形也命之則四根之則一守之不得舍之不失是謂正一抱樸子云朱草莖如珊瑚刻之汁流如血以玉投汁中丸爲泥久卽成水以金投之名曰金漿以玉投之名曰玉醴天下之人皆知莧葅與鱉同食化爲羣鱉而不知朱草與玉金同食則能分神變化而仙矣小人者眞人自謙之詞也後倣此由是知之神可以分也氣可以泮也形可以散也一形可以化爲萬萬形不謂不足斂萬神而爲一神不謂有餘其豈虛言哉葢有道存焉耳然此神化氣變之道若非躬踐實到神氣剛大者未足與議也且以世之物情推之譬如狂風飄髮尚且夜夢身飛屐齒斷蚓猶且首尾俱動夫何故而其然乎太虛一虛也萬神一神也萬氣一氣也萬形一形也分之則四其原一也一者寂而靈無而有散之一切處斂之在方寸終日相隨而人莫識謂之本然之妙也這箇妙本若以色相求之則不見以方所守之則不能不召而自來舍之不可去禱之則靈感之則應神哉神哉其斯正一天地天地盜太虛生人蟲盜天地生𧕍虰盜人蟲生𧕍虰者腹中之蟲也㗘我精氣鑠我魂魄盜我滋味而有其生有以見我之必死所以知天之必頽天其頽乎我將安有我其死乎𧕍虰將安守所謂奸臣盜國國破則家亡蠧蟲食木木盡則蟲死是以大人鍊精氣藏魂魄薄滋味禁嗜欲外富貴雖天地老而我不傾𧕍虰死而我長生姦臣去而國太平天地在太虛中得太虛之氣以生人在天地中得天地之氣以生𧕍虰在人身中得人之氣以生𧕍虰卽蛔類然其㗘嚙我之精血銷鑠我之魂魄盜竊我之滋味而有其生但見其日夜蠱我蝕我有以見我之必死所以知天必期於頽矣天其頽乎而我又安在哉我之死乎𧕍虰豈能不死正如奸臣蠧國國破而家亦亡蠧蟲蝕木木盡而蟲亦死是以眞人垂憫示人以修鍊之法不識不知斬三尸以全精氣不視不聽馘五賊以安魂魄斷腥茹蔬薄滋味以鍊形軀不癡不淫絕嗜慾以養神眞不貪不求外富貴以厚其身無念無思以消其羣陰而生陽無事無爲以蠲其情妄而復性心存至道神不離根則性命在我矣天地雖老而我不傾𧕍虰死而我長生奸臣去而國太平稚子稚子弄影不知爲影所弄狂夫侮像不知爲像所侮化家者不知爲家所化化國者不知爲國所化化天下者不知爲天下所化三皇有道者也不知其道化爲五帝之德五帝有德者也不知其德化爲三王之仁義三王有仁義者也不知其仁義化爲秦漢之戰爭醉者負醉疥者療疥其勢彌顛其病彌篤而無返者也稚子或舞或逐以戲其影適足以自乏而反爲影之所弄矣狂夫或凟或慢而侮其像適足以自忿而反爲像之所侮矣士庶不安其分妄欲化家爲宅不勝其勞矣家不可化而反爲家之所化也大夫不安其分妄欲化宅爲國不勝其苦矣國不可化而反爲國之所化也諸侯不安其分妄欲化國爲天下不勝其困矣天下不可得而反爲天下之所化也三皇有道者也化天下者不知三皇之道本無爲執德而化爲五帝五帝有德者也化天下者不知五帝之德本湻樸躬行仁義而化爲三王三王有仁義者也化天下者不知三王之仁義本忠信而雜王霸化爲秦漢之戰爭此亦世降道衰之意也自茲以降化爲戰國之權詐化爲五季之凟亂昬昬然如醉者負醉而其顚蹶之勢愈倍矣撓撓然如疥者療疥而其疥癩之疾愈多矣此亦當時傷世思古之意惜乎不能復中古之全盛返上古之湻風哀哉陽燧陽燧召火方諸召水感激之道斯不遠矣高視者强低視者賊斜視者狡平視者仁張視者怒細視者佞遠視者智近視者拙外視者昬内視者明是故載我者身用我者神用神合眞可以長存陽燧形圓對日燧之則火生方諸大蛤也摩拭令𤍠向月映之則津滴咦此感彼符雖億千萬里之遠感應於呼吸之間何神速若是哉斯造化之神也豈不見人之眸子乎觀彼高視者稟性剛健故强行低視者稟性陰毒故賊世邪視者其心偏故奸狡平視者其心正故慈仁張視者其性暴故多怒細視者其心多故邪佞遠視者其心明故聰慧近視者其神昬故愚拙務於外者心久必昬存其中者心久必明由是之故觀人之形則知人之心矣蓋形者神之載也心者神之用也心不逐境返神於心其神不神與道合眞長生之道馴可至矣死生虛化神神化氣氣化血血化形形化嬰嬰化童童化少少化壯壯化老老化死死復化爲虛虛復化爲神神復化爲氣氣復化爲物化化不間由環之無窮夫萬物非欲生不得不生萬物非欲死不得不死達此理者虛而乳之神可以不化形可以不生人之初也自無而有無本虛也虛能變化自然化神神運變動化而爲氣氣盈化血血氣交接合而化形初生化嬰稍長化童漸長化少漸大化壯壯必化老老必化死神逝氣散復化爲虛虛復化爲神神復化爲氣氣復化爲形生生化化如循連環無有窮際萬物非欲生時至氣聚不得不生萬物非欲死時至氣散不得不死此造化自然之理也由是觀之物之始也自虛而有物之終也復歸於虛虛也者造化之本也旣知得虛爲化本則識神是生根心不外緣神自歸寂虛寂圓通返還混沌之先所謂虛而乳之也經云惟道集虛知夫虛者返神合眞歸根復命臻於不生不滅之鄉故神可以不化形可以不生也爪髮爪髮者我之形何爪可割而無害髮可截而無痛蓋營衞所不至也則是我本無害而筋骨爲之害我本無痛而血肉爲之痛所以知喜怒非我作哀樂非我動我爲形所昧形爲我所愛達此理者可以出生死之外爪乃筋之餘髮乃血之餘皆吾身也其爪可割其髮可截而無害無痛何也蓋其血脉所不至是以無害無痛也而其害之痛之者筋骨血肉爲之累也然我之眞身則未嘗害未嘗痛故曰我本不害而筋骨爲之害我本不痛而血肉爲之痛也經云人之所以有大患者爲吾有身是也所以知其喜怒非我作哀樂非我動蓋以吾之性分之中本無喜怒本無哀樂而其所以喜怒哀樂者是情而非我也我者性也若知得縱情昧性而爲死之徒故必禁絕嗜慾反情以復其性則不被形之所昧我之所愛超然出於生死之外矣神道太上者虛無之神也天地者陰陽之神也人蟲者血肉之神也其同者神其異者形是故形不靈而氣靈語不靈而聲靈覺不靈而夢靈生不靈而死靈水至淸而結冰不淸神至明而結形不明冰泮返淸形散返明能知眞死可以遊太上之京無上之上謂之太上太上者至高至上虛無自然之神也陰陽之形莫大於天地天地者陰陽之形也血肉之屬人爲最靈人蟲者血肉之神也數者之形雖然大小不同而其神則無不同矣形者塊然一物耳旣已爲物其能靈乎而其運動言笑周知百爲有無形者爲之故曰形不靈而氣靈也語非聲也何言之有故知語者聲之爲是語不靈而聲靈也心有所思夢亦隨變如陰壯夢水陽壯夢火夢飲者憂夢歌者哭之類是覺不靈而夢靈也死爲鬼矣渠能知未來事是生不靈而死靈也水淸能鑑物結冰則不能鑑矣吾之神虛靈晃朗無所不明但人拘於形體之私情妄所蔽是以不明矣若夫忘形斷諸染著令此虛靈返還太空如冰泮返淸形釋返明也眞死者無死也故知我本不死而死之者幻形也吾能未死先死弘無生之心又何死之有矣知夫無生無死者則知生死之原謂之眞死故能返還於無上至上之天與元始同其居矣神交牝牡之道龜龜相顧神交也鶴鶴相唳氣交也蓋由情愛相結所以神氣可交也是故大人大其道以合天地廓其心以符至眞融其氣以生萬物和其神以接兆民我心熙熙民心怡怡心怡怡兮不知其所思形惚惚兮不知其所爲若一氣之和合若一神之混同若一聲之哀樂若一形之窮通安用旌旗安用金皷安用賞罰安用行伍斯可以將天下之兵滅天下之敵是謂神交之道也兩龜相視形不交而神交也兩鶴相唳體不合而氣合也蓋其兩意相接兩情相感而神氣所以交合也是以有道之士體物知身法陰陽以合天地之交泰空其心以合自然之至眞養其氣以充天地之氣而天地之氣順以生萬物和其神以感天地之神而天下之神靈以福兆民然以我之心熙熙然而和樂則兆民之心亦怡怡然而悅從此亦以和感和之意也夫道本無思也本無爲也故有道者心怡怡兮而不知其所以思神惚惚兮而不知其所以爲恍惚兮若一氣之融和而契造化杳冥兮若一神之混合而符太空啾喞兮若一聲而同天下之哀樂渾洞兮若一體而洽兆民之窮通此聖人南面無爲化成天下之術也又安用乎旌旗金皷賞罰行伍以取天下哉斯足以將天下之兵滅天下之敵此聖人之誠能召天地之和能契萬彚之心是謂神交之道也太含虛化神神化氣氣化形形氣相乘而成聲耳非聽聲也而聲自投之谷非應聲也而響自滿之耳小竅也谷大竅也山澤小谷也天地大谷也一竅鳴萬竅皆鳴一谷聞萬谷皆聞聲導氣氣導神神導虛虛含神神含氣氣含聲相導相含雖秋蚊之翾翾蒼蠅之營營無所不至也由此知之雖絲毫之慮必有所察雖啾嚓之言必有所聞唯大人之機天地莫能見陰陽莫能知鬼神莫能窺夫何故道德仁義之所爲虛自然化神神自然化氣神氣妙合自然化形而形含氣氣通乎形形氣相乘而成聲也耳惟虛也非欲聽聲而聲自投之谷惟虛也非欲應響而響自滿之夫耳者竅之小者也谷者竅之大者也推而上之山澤小谷也天地大谷也而其谷雖然大小不同應響無不同矣是謂一竅鳴萬竅皆鳴一谷聞萬谷皆聞也谷非聲則無所聞聲非氣則無所響蓋以聲通氣氣通神神通虛虛者大谷也天地以至虛中生神故曰虛含神也神者氣之主故曰神含氣也氣者聲之主故曰氣含聲也聲本乎氣氣成乎聲而相通相含故能成其響矣秋蚊蒼蠅物之微也翾翾營營飛之聲也言此二物其聲雖微亦足以達於山澤天地而臻乎太虛故曰無所不至也由此知之人之慮也不可以不謹人之言也不可以不愼苟萌纎毫之私慮發啾嚓之邪言則必有察之聞之者存而其禍福之機如谷之應也易曰言行所以動天地可不戒哉竊知聖人心無慮也而慮必中理愼於言也而言必中節心與道合冥然一念不萌天地雖大莫能測其端陰陽雖妙莫能知其機鬼神至靈莫能窺其際夫何故而其然乎蓋以聖人虛心無爲以道立身以德輔世以仁濟眾以義制事因人之是而是之因人之非而非之因人之慮而慮之因人之言而言之隨感隨應應變不窮故物不可得而累也術化雲龍雲龍風虎得神氣之道者也神由母也氣由子也以神召氣以母召子孰敢不至也夫蕩穢者必召五帝之氣苟召不至穢何以蕩伏虺者必役五星之精苟役不至虺何以伏小人由是知陰陽可以作風雲可以會山陵可以拔江海可以發用之於外不如守之於内守之於内然後用之於外則無所不可雲從龍風從虎氣從神各從其類也龍吟則雲起虎嘯則風生得神氣之道者也神化氣神者氣之母也神母旣住氣子自回以母召子孰敢不至也若夫蕩穢者必召五方五帝之氣苟召不至則穢不可得而蕩也伏毒虺者必役五行五星之精役不至則虺不可得而伏也由是知之陰陽風雲不但天地吾身亦有之知此術者可以會風雲而作晴雨可以移山陵而塞江海其豈虛言哉斯道之用耳達斯理者其必守之於内養之有素積之旣厚然後用之於外則無不能也逐於外者其神奔其氣餒雖欲爲之不可得也猛虎猛虎行草木偃毒鴆怒土石揭威之所鑠氣之所搏頑嚚爲之作小人由是知鋏可使之飛山海可使之移萬物可使之相隨夫神全則威大精全則氣雄萬感不能溺萬物可以役是故一人所以能敵萬人者非弓刀之技蓋威之至也一人所以能悅萬人者非言笑之惠蓋和之至也虎猛獸也威走則風從草木所以偃也鴆毒鳥也羽毛畫酒人飲立死怒則土石揭也草木之所以偃者虎之威而鑠之也土石之所以揭者鳥之氣而搏之也威之怒之偃之揭之起於頑嚚惡毒之氣而致然也由是知之人之用猶有大於此矣劒可使之飛山河可使之移萬物可使之相隨者皆人之術耳術者變化玄技道之用也善於此者其必全其神養其精若精不養則術不神神不全則術不靈神全則威大精全則氣雄神用於此則物應於彼故雖萬里變化於呼吸之間感應之機毫忽不爽也達斯理者其必知之明養之厚積之深行之篤六欲莫能侵萬惑莫能溺故能盜眞機奪造化夏造冰冬起雷役鬼神易萬物輔道教澤兆民袪精邪療疾病隨所感而應矣是故一人所以能敵萬人者非弓刀之技血氣之勇而能敵之也蓋以平日所養道德柔弱不爭之勇所以天下莫能與之敵斯天下之至威也一人所以能悅萬人者然非言笑之媚利欲之惠而能悅之也蓋以平日所施忠信慈祥不忍人之恩所以天下莫不悅其德斯天下之至和也用神蟲之無足蛇能屈曲蛭能掬蹙蝸牛能蓄縮小人所以見其機由是得其師可以坐致萬里而不馳是故足行者有所不達翼飛者有所不至目視者有所不見耳聽者有所不聞夫何故彼知形而不知神此知神而不知形以形用神則亡以神用形則康蟲之無足而能行者如蛇之屈曲行水蛭撮促行蝸牛蓄縮行君子見此數者無足亦行有天性自然之妙而悟其機由是而心師之雖萬里之遠不行而能至如言不移一步到長安是也是故足行者足跡所至而不多故有所不達矣翼飛者翺翔所及而不高故有所不至矣目視者不能見無色之色故有所不見矣耳聽者不能聽無聲之聲故有所不聞矣夫何故蓋其惟知足之能行翼之能飛目之能見耳之能聽惟知其迹而不知其行不在足飛不在翼視不在目聽不在耳者存焉彼知全其身者而不知全其神以形用神故亡也由是知之全其身者莫若全其神以神用形故泰也水竇水竇可以下溺杵糠可以療噎斯物也始製於人又復用於人法本無祖術本無狀師之於心得之於象陽爲陰所伏男爲女所制剛爲柔所剋智爲愚所得以是用之則鐘皷可使之啞車轂可使之鬬妻子可使之改易君臣可使之離合萬物本虛萬法本無得虛無之竅者知法術之要乎水竇空穴以通水道也亦可以下溺杵糠舂米皮也亦可療噎斯二物也自人制之而人復用之故知法本無祖術本無狀也竊嘗思之天下之術其本無始其末無定用無定用惟變是用蓋言不可定執但師之於心然後求之於物自然得其象矣陽爲陰所伏者寒能勝躁也男爲女所制者靜能制動也剛爲柔所剋者柔弱勝剛强也智爲愚所得者巧爲拙之所使也以是用之鐘鼓有聲使之啞者動中恆靜之意也車轂靜而使之鬬者靜中恆動之意也妻子不可改易者也可使之改易君臣不可離合者也可使之離合極言法術無定執之意蓋其知道本虛知術本無也不明此理妄意爲之執之以爲法術者則不足以知法術之要也知夫無法之法無術之術得無爲自然之竅以鍊虛寂不神之神者知法術之要也魍魎魍魎附巫祭言禍福事每來則飲食言語皆神每去則飲食言語皆人不知魍魎之附巫祭也不知巫祭之附魍魎也小人由是知心可以交氣可以易神可以奪魄可以錄形爲神之宫神爲形之容以是論之何所不可魍魎水神也如三𡻕小兒赤黑色巫祭降神師也魍魎附之渠能言禍福事如響其神降也則飲食言語皆神其神退也則飲食言語皆人不知魍魎之附巫祭也不知巫祭之附魍魎也竊知神本至無感之則有孰爲彼孰爲我孰爲魍魎孰爲巫祭也蓋以人之神與魍魎之神一神也人之氣與魍魎之氣一氣也以神召神以氣感氣其附巫祭之意亦甚明矣由是知之吾心可以交神明吾氣可以易彼氣吾神可以奪彼神吾魄可以鍊彼魄吾形爲神之宮吾神爲形之容以是論之宜乎渠知未來事何足怪也故曰何所不可虛無鬼之神可以禦龍之變可以役蛇蝎可以不能螫戈矛可以不能擊惟無心者火不能燒水不能溺兵刃不能加天命不能死夫何故志於樂者猶忘飢志於憂者猶忘痛志於虛無者可以忘死生鬼之神雖能厲人吾以正而禦之自然不神不敢干犯於人矣神龍雖能變化吾能役之作雨蛇蝎雖能毒螫吾能使之屈伏戈矛雖能擊人吾能使之不用夫何而其然乎以我無害物之心雖有厲鬼蛟龍毒蟲兵刃亦不能傷害我矣得此道者其能藏心於密合神於空釋念於虛潛身於靜以塊然之身如風如影恍惚而不知其有所於一切處無心故雖入火而火莫能焚入水而水莫能溺入軍兵刃莫能加者蓋其知得眞我無死則陰陽不能陶鑄之矣竊嘗觀之其心樂者猶忘飢其心憂者猶忘痛其心奮者猶忘寒其心養者猶忘病故知志於虛無者則無所不忘其心無塵垢身無繫累故能離有無出生死超然出於塵囂之外矣虛實方咫之木置於地之上使人蹈之而有餘方尺之木置於竿之端使人踞之而不足非物有大小蓋心有虛實是故冒大暑而撓者愈𤍠受炙灼而懼者愈病人無常心物無常性小人由是知水可使不濕火可使不燥咫八寸也蹈踐也踞者獨處而蹲也以方咫之木置於地之上人能蹈而踐之也方尺之木置於竿之端則人莫能踞而蹲之也非咫之小尺之大有能與不能蓋人之心知地之實竿之虛由是而知吾之心矣譬如冒大暑者其心亂而𤍠愈熾受炙灼者其心懼而痛愈甚豈不灼然乎其若當大暑者此心常靜而安定受炙灼者其心常激而忘痛其𤍠必消痛必緩矣吁心靜則勝𤍠心激則忘痛故知人無常心物無常性也由是知之水性流下火性炎上吾能使此意常定則眞水生陽火得陰水灌漑其炎上者自然下降而不燥矣吾能使此心常虛則眞火降陰水得陽火薰蒸其流下者自然上升而不濕矣此陰陽顚倒之妙還丹之術也狐狸狐狸之怪雀鼠之魅不能幻明鏡之鑑者明鏡無心之故也是以虛空無心而無所不知昊天無心而萬象自馳行師無狀而敵不敢欺大人無慮而元精自歸能師於無者無所不之狐狸雀鼠有能幻形魅人能欺人而不能欺明鏡者爲人有心明鏡無心故也由是知之明鏡無心尙能鑑萬物之眞形吾能以無心爲心物亦不能欺我矣是故虛空湛然禱之則靈感之則應無所不知也昊天夏天也元炁廣大浩然充足故能長養萬物也兵家行師不動如山難知如陰進如山移退如風雨敵莫能測所以不能欺也故知有道之士忘形去累絕慮斷緣無心於事無事於爲神不外遊而元精自歸故知以無心爲心者至要也學士誠能以無心爲師則可以盜天地奪造化通物情盡性命雖爲無爲何事不可轉舟轉萬斛之舟者由一尋之木發千鈞之弩者由一寸之機一目可以觀大天一人可以君兆民太虛茫茫而有涯太上浩浩而有家得天地之綱知陰陽之房見精神之藏則數可以奪命可以活天地可以反覆尋八尺也萬斛巨舟用一尋之木能使之轉使之移也鈞三十斤也千鈞勁弩設一寸之機能使之發使之中也一目之眇也日月星辰森羅萬象無所不見也一人之獨也四海九州天下兆民無所不臣也此言人爲萬物之靈而其用如此之大其所以用之者誰歟乃吾心之主宰耳太虛茫茫豈有涯乎太上浩浩豈有家乎蓋言有此主宰之妙存焉耳斯妙也難以筆舌形容在乎人之靈府自參自悟耳解悟之者得天地之綱也知陰陽之奥也見精神之藏也旣知其妙而復得其綱知其奥見其藏則道妙在我而命不屬天地矣故曰數可以奪命可以活天地可以反覆也心變至淫者化爲婦人至暴者化爲猛虎心之所變不得不變是故樂者其形和喜者其形逸怒者其形剛憂者其形慼斯有變化之道也小人由是知顧六尺之軀可以爲龍蛇可以爲金石可以爲草木大哉斯言心淫者化爲婦人心暴者化爲猛虎心毒者化爲蛇蝎心狡者化爲獮猴貪嗜者化爲蠅蛆多言者化爲蟬螽懶惰者化猪鵞之類故知出入於四生六道之中皆自一心造而化之耳然其心之所之不得不之心之所變不得不變也是故豈不見人之情乎心樂者其容和悅心喜者其容愉逸心怒者其容剛忿心憂者其容愴慼情動於中而形諸外斯足以見變化之道由是知之顧人六尺之軀塊然挺生於天地有存心於道德者則超凡入聖如龍蛇之變化有存心於忠義者誠意正心如金石之堅貞有存心於人欲者自棄自暴與草木同腐朽而化爲異類豈非人之一心隨情所變而化之乎大矣哉斯言也珠玉悲則雨淚辛則雨涕憤則結癭怒則結疽心之所欲氣之所屬無所不育邪苟爲此正必爲彼是以大人節悲辛誡憤怒得灝氣之門所以牧其根知元神之囊所以韜其光若蚌内守若石中藏所以爲珠玉之房有傷於心則悲泣而淚出有痛於心則酸辛而涕出有忤於心則煩怒而結癭有激於心則嗔恚而結疽數者皆自然之情感於衷以暴其氣而化出許多節病所謂心之所之氣亦隨之故曰無所不育也邪爲此興其正必爲彼而失此人情之常也是以大人知情欲爲妄以其當悲者悲之當辛者辛之當憤者憤之當怒者怒之無有一毫人欲私意增損於事物之上一切付之自然則悲辛憤怒者在物不在己矣然非善養浩然造道之深者孰能與於此哉若得浩然之門而志於靜者則能歸虛無收其根以復其命矣知元神虛寂而安於默者則能黜聰明藏其光以養其知矣是以聖人内懷至美容貎若愚如蚌内藏珠石中隱玉而人莫能見其美故云珠玉之房也蠮螉夫蠮螉之蟲孕螟蛉之子傳其情交其精混其氣和其神隨物大小俱得其眞蠢動無定情萬物無定形小人由是知馬可使之飛魚可使之馳土木偶使之有知嬰兒似乳母斯道不遠矣蠮螉卽蜾蠃也詩云螟蛉之子蜾蠃負之是也蠮螉負靑蟲於木空中呪七日化爲螟蛉當是時也精思而傳其情交其精專一而混其氣和其神心無二想志不外移其蠢然者忽然變化而肖其形其意蓋謂天地生物雖然蝡動之微而其本然之眞未嘗不與人同故知一切含靈隨感隨化而無定情無定形也由是知之馬者善馳其能飛乎魚者善遊其能馳乎土木無心其能有知乎嬰兒方生豈似乳嫗乎蓋有道存焉耳此章之意蓋謂以蠮螉之微尚能用神集氣變化易形何况人爲萬物之靈豈不能感化物情哉苟能專其心一其志交其精混其氣和其神集此虛靈常住不滅但凡一舉心一動念如箭之行而物類豈有不感通變化哉善行此術唯有道者胡夫胡夫而越婦其子髯面而矬足蠻夫而羌婦其子抝鼻而昻首梨接桃而本强者其實毛梅接杏而本强者其實甘以陰孕陽以柔孕剛以曲孕直以短孕長以大孕小以圓孕方以水孕火以丹孕黃小人由是知可以爲金石可以爲珠玉可以爲異類可以爲怪狀斯造化之道也胡人多髯矬足羌人抝鼻昻首胡夫越婦生子似父蠻夫羌婦生子似母或陰孕陽或陽孕陰之喻也梨接桃其實毛梅接杏其實甘或柔孕剛或剛孕柔之喻也天地之道有陰則有陽有柔則有剛萬物之道有曲則有直有短則有長有大則有小有圓則有方有水則有火有丹則有黃由是知之人與天地萬物並生於太虛中本同一體而其金石珠玉異類怪狀皆一氣所化爲造化之迹道之用耳陰陽陰陽相搏不根而生芝菌燥濕相育不母而生蝤蠐是故世人體陰陽而根之效燥濕而母之無不濟者小人由是知陶鍊五行火之道也流行無窮水之道也八卦環轉天地之道也神物乃生變化之道也是以君子體物而知身體身而知道夫大人之道幽且微則不知其孰是孰非芝菌無根而生蓋由陰陽之氣相摩而成蝤蠐無種而生蓋由燥濕之氣相蒸而成人能體此陰陽相生相成之道法燥濕氤氲交密之妙則知大道之根生化之母也旣知其根復得其母則造化在我故無所不濟矣由是知之煆煉萬物者莫如火滋潤萬物者莫如水天地水火雷風山澤分列流峙運行環轉於其間此道之昭著而形於外也斯道也蓋由陰陽之精相搏而神物生斯足以見變化之道也是以君子體物而知陰陽生化之理體身而知陰陽相搏以生神明之微盡心以知性盡性以合眞者大人之道也故知大人之道無思無慮無識無知其心純粹其道幽微而不知其孰是道孰非道亦不知其孰爲是孰爲非也海魚海魚有以蝦爲目者人皆笑之殊不知古人以囊螢爲燈者又不知晝非日之光則不能馳夜非燭之明則有所欺觀傀儡之假而不自疑嗟朋友之逝而不自悲賢與愚莫知惟抱純白養太玄者不入其機蝦在海中其身光海魚夜遊以蝦爲目人皆以爲虛誕之詞大笑之而不信殊不知古之人如匡衡者亦嘗囊螢爲燈也其意謂魚雖巨也無光莫能夜遊目雖明也無燈莫能夜見又不知天地之間寥廓無光其晶明者日之光耳當其晝也非日之光則一切飛潛蝡走其能馳乎當其夜也非燭之明則一切奸盜乘之而有所欺矣吁人惟見傀儡之假而不知己之形亦幻矣人惟悲朋友之先逝而不知己之色身亦須臾耳嗟夫疑人而不自疑悲人而不自悲舉世之賢與愚皆迷其心惑於物懵懵然而莫知其理惟其抱純素懷貞白養太虛法自然者知形之幻而無所疑見理之眞而無所癡是以不入其機磵松磵松所以能凌霜者藏正氣也美玉所以能犯火者蓄至精也是以大人晝運靈旗夜錄火芝覺無所覺思無所思可以冬禦風而不寒夏禦火而不𤍠故君子藏正氣者可以遠鬼神伏奸佞蓄至精者可以福生靈保富夀夫何爲多少之故也磵松所以能淩霜雪而不凋者爲其心堅實藏正氣是以不凋也美玉所以能犯炬火而不灰者爲其性温潤蓄至精是以不灰也故有道之士常虛心而存正氣常弱志以蓄至精晝有爲而靈臺常靜宵無爲而元火常温有知如無知覺無所覺也無爲而不昧思無所思也故能冒風雪而不寒當燥火而不𤍠所謂寒暑不能侵也是故君子所以藏正氣者其神全所以鬼神不敢犯其心正所以奸佞莫能欺蓄至精者其願普故可以福生民其氣和故可以保夀命若夫意不誠則心不正志不弱則氣不和則不能伏鬼神遠奸佞福生民以全其夀命而終其天年也動靜動靜相摩所以化火也燥濕相蒸所以化水也水火相敵所以化雲也湯盎投井所以化雹也飲水雨日所以化虹霓也小人由是知陰陽可以召五行可以役天地可以别構日月可以我作有聞是言者必將以爲誕夫民之形也頭圓而足方上動而下靜五行運於内二曜明於外斯亦别構之道也鑽木擊石皆可得火木石靜也而其鑽之擊之者動也故曰動靜相摩所以化火也炊米得酒上濕下燥濕𤍠相蒸所以化水也陰陽之氣熏蒸水火氤氲化氣若雲以湯盎投井中冷熱相搏而生雹珠飲水噴日滿日靑紅猶如虹蜺由是知之則水火雲雹不惟天地有之而人亦可作也陰陽氣也吾之氣與陰陽之氣同一氣也以氣感氣故可召矣在天爲五行爲五帝在人爲五臟爲五神吾之神與五行之神一神也以神用神故可役也天地形氣也吾之氣天之屬也吾之形地之屬也然吾之形氣與天地並生於太虛中天地形氣大者也吾身形氣小者也吾能與天地分一氣而治故曰天地可别構也日月天之神也容光必照而吾左目象日右目象月而無所不見故曰日月可以我作也或有聞是言者以爲驚眾駭俗誇大虛誕之言疑之而不信者有矣豈不見我之形乎頭圓在上以象天足方在下以象地圓者運於上方者止於下精神魂魄意之五神而運於中兩目朗耀而見於外數者假合而成此身斯亦别構之道也聲氣操琴瑟之音則翛然而閑奏鄭衞之音則樂然而逸解瓴甓之音則背旅凜森撾皷𥀷之音則鴻毛躑躅其感激之道也如是以其和也召陽氣化融風生萬物也其不和也作陰氣化厲風辱萬物也氣由聲也聲由氣也氣動則聲發聲發則氣振氣振則風行而萬物變化也是以風雲可以命霜雹可以致鳳凰可以歌熊羆可以舞神明可以友用樂之術甚大或有操琴瑟之音聞之者則翛然而心閑或有奏鄭衞之音聽之者則樂然而心逸或有解瓴甓之聲則膂背凜然而森立或有撾皷𥀷之聲則鴻鵠躑躅而不行數者聲之感人也蓋樂者和也以和召和故可以召純粹之正氣可以化融和之湻風而萬物所以生也其不和也則陰慘肅殺之氣作虐厲乖戾之風生而萬物所以辱也氣者聲之主聲者氣之和也苟無其氣則何聲之有也氣動而聲必發聲發而氣自振氣振則風行而萬物所以成乎變化矣是以知其可以作風雲而爲雨晹可以致霜雹而驅炎暑可以使祥禽瑞獸而自歌自舞可以友神明而通乎天人非天下之至和者其孰能爲是哉斯樂之術甚矣而其用有如是之大大同虛含虛神含神氣含氣明含明物含物達此理者情可以通形可以同同於火者化爲火同於水者化爲水同於日月者化爲日月同於金石者化爲金石惟大人無所不同無所不化足可與虛皇並駕虛本至無吾心無欲無欲則虛靜而返於無以我之無合彼之無謂之虛含虛也神本至寂吾心無思無思則神寂以我之寂合彼之寂謂之神含神也氣本至和吾心無爲無爲則氣和以我之和合彼之和謂之氣含氣也明本光也慧而不用不用光復歸其明以我之明合彼之明謂之明含明也物本至有物我兩忘兩忘則物我爲一物卽我我卽物謂之物含物也達斯理者情可以通而無所不通也形可以同而無所不同也譬如思火則生煖思水則生凉虛心則生明立志則心堅也是以有道之士存神而元鼎常温固氣而水源常靜濳光而明照於内弱志則堅固形軀故無所不同無所不化也其心同太虛其神符至眞故可與元始法王並駕遊於淸微天玉淸境中矣帝師鏡非求鑑於物而物自投之槖非求飽於氣而氣自實之是故鼻以虛受臭耳以虛受聲目以虛受色舌以虛受味所以心同幽冥則物無不受神同虛無則事無不知是以大人奪其機藏其微羽符至怪陰液甚奇可以守國可以救時可以坐致爲帝王之師鏡之明也非其求鑑於物而物自形之槖之虛也非其求飽於氣而氣自滿之皆自然而然也是故鼻惟虛也故能受香臭耳惟虛也故能受聲音目惟虛也故能受形色舌惟虛也故能受滋味心同幽冥者則萬物云寂故無所不受神同虛無者則萬事畢具故無所不知是以大人奪造化之機藏心於虛歸志於無以養其自然陽符至則陰情自滅陰液降則陽靈愈奇故可佐君以守其國澤民以救其時而其道之尊德之貴故可以爲帝王師琥珀琥珀不能吸腐芥丹砂不能入燋金磁石不能取憊鐵元氣不能發陶爐所以大人善用五行之精善奪萬物之靈食天人之祿駕鳳馬之榮其道也在忘其形而求其精無氣爛草所以琥珀不能吸炬火燋金所以丹砂不能入無性憊鐵所以磁石不能取焦燥陶爐所以元氣不能生四者有形無精所以不靈矣夫精者元氣之母物之本也靈者元性之妙神之發也此精眞空此靈妙有以有合空故能生化是以至人善用五行之精善奪萬物之靈知眞空爲不生知妙有爲不滅是以固守虛無以養其精靈所以形神俱妙羽化登眞飲金漿飡玉液食天人之祿乘龍馬駕鸞鶴享馭駕之榮其爲道也滅除世幻而忘其形得無形之眞精養虛寂之元靈體合自然超出三界返還太空矣德化五常儒有講五常之道者分之爲五事屬之爲五行散之爲五色化之爲五聲俯之爲五岳仰之爲五星物之爲五金族之爲五靈配之爲五味感之爲五情所以聽之者若醯雞之遊太虛如井蛙之浮滄溟莫見其鴻濛之涯莫測其浩𣺌之程日暮途遠無不倒行殊不知五常之道一也忘其名則得其理忘其理則得其情然後牧之以淸靜棲之以杳冥使混我神氣符我心靈若水投水不分其淸若火投火不間其明是謂奪五行之英盜五常之精聚之則一芥可包散之則萬機齊亨其用事也如酌醴以投器其應物也如懸鏡以鑑形於是乎變之爲萬象化之爲萬生通之爲陰陽虛之爲神明所以運帝王之籌䇿代天地之權衡則仲尼其人也儒者談仁義禮智信五常之道分而言之則爲五事如父子主仁君臣主義夫婦主禮兄弟主智朋友主信屬之則仁屬木義屬金禮屬火智屬水信屬土之五行散之則爲靑白黃紅黑之五色化之則爲宫商角徵羽之五音俯之則爲東西南北中之五嶽仰之則爲𡻕熒惑太白辰鎭之五星物之則爲金銀銅鐵錫之五金族之則爲精神魂魄意之五神配之則爲辛甘酸苦鹹之五味感之則爲喜怒愛惡欲之五情語者曰道之至矣而聽之者信然不疑嗟夫若以此爲至道是知其末而不知其本至道豈止此哉其所見者小也若然者正如醯雞之遊太虛井蛙之浮滄溟太虛鴻濛而無涯豈醯雞所能到滄溟𣺌漠而無際豈井蛙所能測此言下士以見聞爲道故爲識者之所誚也但見其愈分愈繁愈求愈有得此而遺彼嗟時光之易邁懼大道之難明中途退惰故曰日暮途遠無不倒行蓋其不知道之本也殊不知五常之道分而言之則有五者之殊原其本則一也忘異名而求其本則合道而理得矣得其理則知五常之道自然之情道之迹也吁學旣得理而復知其情踐其迹則釋然無疑而至道明矣夫至道不繁以淸靜自牧以杳冥棲眞使神會氣使氣合眞神合眞以契我心之靈如萬水合爲一水不分其淸萬火合爲一火不間其明以類相求則鴻濛之涯可至浩𣺌之程可登故可以奪五行之英華竊五常之至精斂之則一芥包須彌散之則萬機而放乎太淸其施於事也如瓶㵼酒其應物也如鑑照形極言容易事耳於是乎變而用之則爲萬象化而成之則爲萬生運而行之則爲陰陽虛而靈之則爲神明如孔子作春秋代人君運籌䇿以當南面之治使天下後世亂臣賊子懼而其大經大法天下後世莫能更誠爲萬代人文之凖則天地庶物之權衡極言孔子人道之正古今一人而已飛蛾天下賢愚營營然若飛蛾之投夜燭蒼蠅之觸曉窗知往而不知返知進而不知退而但知避害以就利不知聚利而就害夫賢於人而不賢於身何賢之謂也博於物而不博於巳何博之謂也是以大人利害雙亡何往不臧天下之人其賢與愚惟知有名利而巳惑於名利者不得必孜孜盡心力以求之營營竭智慮以謀之殊不知名利有分非能强求迷惑之者若飛蛾見夜光而趨之以速其死若蒼蠅見曉窗以赴之而迷其出嗟夫蒼蠅知往而不知返飛蛾知進而不知退譬人迷惑貪名利以喪其身者之鑒戒也嗟夫世之人皆知避害就利以名利爲富貴而不知其聚利藏害乃殺身之斧斤噫名利外物至小也身者天之所賦至大也以至大而徇其至小豈不爲世之愚夫乎嗟夫世之人以富貴才藝賢於人而不貴其身何賢之謂也博外物而不重性命何博之謂也是以有道之士見天理之眞識名利有分無營謀倖進之心得之不忻失之無戚貧富不貳利害雙忘何所往而不善也異心虎踞於林蛇遊於澤非鴟鳶之讐鴟鳶從而號之以其蓄異心之故也牛牧於田豕眠於圃非烏鵲之馭烏鵲從而乘之以其無異心之故也是故麟有利角眾獸不伏鳳有利嘴眾鳥不賓君有奇智天下不臣善馳者終於蹶善鬬者終於敗有數則終有智則窮巧者爲不巧者所使詐者爲不詐者所理虎獨處於林蛇閒遊於澤鴟鳶見之必號其豈鴟鳶之讐哉蓋其蓄心害物之故也牛羣牧於田豕聚眠於圃烏鵲乘之不懼豈烏鵲之馭哉蓋其無異心不害物之故也麟者時之祥也出則眾獸伏而隨之鳳者時之瑞也出則眾鳥賓而衞之若麟有利角而牴眾獸亦不隨之矣鳳有利嘴而攫眾鳥亦不賓之矣奇智者任智數辨事理權謀狙詐之術也君者人倫之首其若逞聰察衒奇智常懷勝人之心而天下之人亦懷其智懼其謀各以奇智拒之而不親謂之天下不臣也譬如善馳者常失於顛蹶善戰者常失於敗亡譬如數也雖千萬億終期於盡用智術也雖千萬變終期於窮極言不可任智數尚征伐以致敗也巧者工其事而拙者弗能也有事則巧者不能辭其勞豈不爲拙者之所使也詐者多情僞正者無僞也事敗則詐者不能掩其惡豈不爲正者之所理也弓矢天子作弓矢以威天下天下盜弓矢以侮天子君子作禮樂以防小人小人盜禮樂以僭君子有國者好聚斂蓄粟帛具甲兵以禦盜賊盜賊擅甲兵據粟帛以奪其國或曰安危德也又曰興亡數也苟德可以恃何必廣粟帛乎苟數可以憑何必廣甲兵乎易曰弦木爲弧剡木爲矢以威天下蓋取諸暌是以天子制弓矢威天下以衞民小人悖亂亦嘗竊用弓矢而犯天子也禮樂者序事之和君子制禮樂以治小人之相犯小人狡猾亦嘗竊用禮樂而僭君子也有國者惟以聚斂多蓄粟帛廣治甲兵以禦賊盜殊不知盜賊本無然由上之貪求賦繁役重以致生業荒蕪飢寒所逼則不顧其性命而爲賊盜矣賊盜因其君之不道則擅其甲兵踞其粟帛以奪其國也或有之曰國之安危在德不在險或有之曰國之興亡在數不在人如其德可恃也何必廣甲兵乎如其數可定也何必廣粟帛乎此言有國者不可以有爲治天下之意蓋以有爲則有敗有得則有失有心治國而國愈亂有意安民而民彌貧是以聖人無心於成則無敗事經云以無事取天下是也聰明無所不能者有大不能無所不知者有大不知夫忘弓矢然後知射之道忘䇿轡然後知馭之道忘弦匏然後知樂之道忘智慮然後知大人之道是以天下之主道德出於人理國之主仁義出於人亡國之主聰明出於人聖人能不在事以能爲不能故無所不能也聖人知不在心以知爲不知故無所不知也眾人强其所不能强其所不知以爲能爲知者故有大不能大不知也譬如善射者中不在弓矢善馭者行不在䇿轡善樂者和不在弦匏夫何故蓋其得之於心自然應之於手心之所之物亦隨之則無不中無不行無不和然後始知大人之道也大人之道純一中正無事無爲無憂無懼何思何謀絕智力尚敦樸美風俗厚人倫以道治天下以德化兆民故不言而民信不刑而民畏端拱無爲而天下治是謂道德出於人故爲天下主也以仁治其國以義使其民以忠信爲保障以刑政爲藩籬制禮作樂而天下化是謂仁義出於人故爲理國之主也敗國之人則反是蓋其不務道德不行仁義逞聰察任智術厚聚斂酷刑法民不聊生以致昬亂必於滅亡是謂聰明出於人故亡爲國之主也有國有國之禮享郊廟敬鬼神也亹龜䇿占吉凶也敬鬼神信禍福之職也占吉凶信興亡之數也奈何有大不信窮民之力以爲城廓奪民之食以儲爲蓄是福可以力取是禍可以力敵是疑貳於鬼神是欺惑於龜䇿是不信於天下之人斯道也賞不足勸罰不足懼國不足守國有郊廟之禮郊焉祭天廟焉祠地所以敬鬼神也亹龜兆美蓍䇿所以占吉凶也有道之君敬鬼神而信禍福占吉凶而信興亡畏天命以順人心進忠良以安宗社奈何不畏天命之君肆情縱欲而窮奢極侈不信禍福不懼滅亡苦民之力而爲城廓奪民之食而爲儲蓄以爲子孫不拔之基享無疆之祚是福可以力取其亡可以力敵也孰不知民力苦則生怨民困窮則生禍民財罄則生亂勢必然也夫何故而其然乎蓋其不信禍福是疑貳於鬼神不畏滅亡是欺惑其龜䇿以不信待天下天下亦以不信叛之如其不亡蓋亦幸矣吁無信於民雖賞之不勸罰之不懼滅亡可待雖有其國其能守乎黃雀黃雀之爲物也日遊於庭日親於人而常畏人而人常撓之玄鳥之爲物也時遊於戸時親於人而不畏人而人不撓之彼行促促此行佯佯彼鳴啾啾此鳴鏘鏘彼視矍矍此視汪汪彼心慼慼此心堂堂是故疑人者爲人所疑防人者爲人所防君子之道仁與義中與正何憂何害黃雀玄鳥皆附屋而窠或遊於庭或行於戸日親於人也黃雀常畏人而玄鳥不畏人畏人者而人反撓之不畏人者而人不撓之何也蓋其有所自耳黃雀之可憎人故撓之玄鳥可愛人故不撓也竊嘗思之人心之愛憎有大公者存然非出於私意在乎物之當憎當愛也彼可憎者其行促促其聲噩噩其視也急其心也憂懼人見其詐而多疑故憎而撓之也彼可愛者其行緩緩其聲喃喃其視也靜其心也安詳人見其信而無疑故愛之而不撓也是故詐者而爲人所憎信者而爲人所愛疑者而爲人所疑防者而爲人所防是皆自然之情也噫以物之詐尚爲人之所憎人之所疑何况於人乎甯不戒哉是故君子之道仁義中正而已矣蓋其不欺不詐不防不疑不避害不憂懼仁義其德中正其心何憂害之有籠猿籠中之猿踴躍萬變不能出於籠匣中之虎狂怒萬變不能出於匣小人之機智慮萬變不能出於大人之道夫大人之道如地之負如天之垂無日不怨無人不欺怨不我怒欺不我夷然後萬物知其所歸猿在籠中踴躍號跳幾千萬變終不能出於籠虎在匣中狂怒哮吼幾千萬變亦不能出於匣以猿之狡虎之猛猶不能出於籠匣之中也其意蓋謂小人之詐如猿暴如虎奸狡百端狂暴萬狀終不能出於大人之道也蓋以大人之道如天之覆如地之負不求人過不見人非不忻善不厭惡不記仇不懷怨而彼小人恩稍不及則怨之見其似訥則欺之豈知大人之量人雖怨之亦不怒人雖欺之如不知是非不入於胷次忿怒不現於形容及其後也小人反之感大人之德心悅誠服而歸化也故曰然後萬物知其所歸常道仁義者常行之道行之不得其術以至於亡國忠信者常用之道用之不得其術以至於獲罪廉潔者常守之道守之不得其術以至於暴民才辨者常御之道御之不得其術以至於罹禍蓋拙在用於人巧在用於身使民親稼則怨誡民輕食則怒夫餌者魚之嗜羶者蟻之慕以餌投魚魚必懼以羶投蟻蟻必去由不得化之道仁以治民義以制事常行之道也不得其術者失仁與義也君不仁則民不親不義則民不伏不親不伏是叛其君宜乎國亡也效職謂之忠眞實謂之信常用之道也不得其術者失忠與信也臣之不忠則不足以事君不信則不足以使民君不能事民不能使是謂具臣宜其獲罪也不貪謂之廉不污謂之潔常守之道也不得其術者失廉與潔也喪心於財貨虧行以辱身厚斂於民而民不從以致於暴虐也博知謂之才利口謂之辯常使之道也不得其術者失才與辯也恃才而慢人强辯以飾非用以欺人持久必敗宜其遭禍也數者皆巧於自私而拙於待人宜乎亡國獲罪暴民遭禍也安逸甘食人之所欲也使之勤苦而躬耕稼穯誡之淸淡而鮮食甘肥宜其怨而怒之也香餌者魚所嗜也羶脂者蟻所嗜也彼知爲害則必懼而去之此皆治國安民之術也不得其術者而反害其民民畏害而逃之蓋其不知德化之道也感喜感父之慈非孝也喜君之寵非忠也感始於不感喜始於不喜多感必多怨多喜必多怒感喜在心由物之有毒由蓬之藏火不可不慮是以君子之業爵之不貴禮之不大親之不知疎之不疑辱之不得何感喜之有忠孝者臣子之分子有心而感父之慈臣懷意而要君之寵是皆出於私意以媚其君謟其父則非忠非孝也殊不知感始於不感喜始於不喜是故子若有心而感父之喜其父亦有心以慈其子孝稍不足則反爲怨矣臣若有心以要君之喜而君亦有心以寵其臣忠稍不足則反爲怒矣蓋以多感必多怨多喜必多怒殊不知感喜怨怒皆出於心如物中有毒心中之毒如蓬中藏火不可以不愼也是以大人尊之以爵而不知貴敬之以禮而不知大親之亦不喜疎之亦不疑恥辱莫能加何感喜之有也太醫太醫之道脉和而實者爲君子生之道也撓而浮者爲小人死之道也太卜之道䇿平而慢者爲君子吉之道也曲而利者爲小人凶之道也以是論之天下之理一也是故觀其國則知其臣觀其臣則知其君觀其君則知興亡臣可以擇君而仕君可以擇臣而任夫揖讓可作而躁靜不可作衣冠可詐而形器不可詐言語可文而聲音不可文醫道有太素脈能察人之生死貴賤衰病也其脈和而實者生之道也其脈撓而浮者死之道也卜道有龜䇿能斷人之吉凶悔吝禍福也其䇿平而慢者吉之道也其䇿曲而利者凶之道也由是論之天下之事紛紜交錯雖千萬變終必歸於理也夫理者一而已矣孔子曰吾道一以貫之是也是故觀其國之治道則知其臣之賢否也觀其臣之政教則知其君之聖凡也觀其君之法令則知其國之興亡也蓋以君臣之道非但君擇臣臣亦擇君耳臣擇其君而仕者欲得君以行其志也君擇其臣而任者欲得臣以治其國也國之不治由不得其臣也志之不行由不得其君也揖讓者形之爲也躁靜者心之有也作者動也言形可動而心不可動也衣冠表也形器裏也詐者僞也言外可僞而心不可僞也言者聲之末聲者言之本也文者見於外也言末可見而其本不可見也讒語藏於人者謂之機奇於人者謂之謀殊不知道德之機眾人所知仁義之謀眾人所無是故有賞罰之教則邪道進有親疎之分則小人入夫棄金於市盜不敢取詢政於朝讒不敢語天下之至公也未發謂之機計出謂之謀眾人皆知有道德之機貪欲而不能行非其不知故曰眾人所知也眾人皆知有仁義之謀好妄而不能爲其所爲者皆詐力智術之謀故曰眾人所無也是故賞罰之教興則邪佞乘機而冒功親疎之分立則小人乘機而間諜其必然也古有捐金於市而盜賊不敢取者恐人之見也詢政於朝而奸佞不敢讒者懼人之知也此天下大公至正之理治道之要也刻畫畫者不敢易於圖像苟易之必有咎刻者不敢侮於木偶苟侮之必貽禍始制作於我又要敬於我又寘禍於我是故張機者用於機設險者死於險建功者辱於功立法者罹於法動一竅則百竅相會舉一事則萬事有害所以機貴乎明險貴乎平功貴乎無狀法貴乎無象能出刻畫者可以名之爲大象畫圖像者其必信心以奉之苟輕易之心生奉之不足其必有咎矣刻木偶者其必䖍誠以敬之苟侮慢之心起敬之不足其必貽禍矣或曰圖像木偶始制作於人又要敬於人苟敬奉之不足又寘禍於人者何也竊嘗思之敬奉圖像木偶者無非謟鬼神以要其福耳如其身端心誠其福或可覬也其身不端心不誠其招咎禍之情亦有之矣是故善用機者其必敗於機能設險者其必死於險貪功者其必辱於功酷法者其必遭於法極言不可以有爲而妄動也然吾之心一動則天下人之心無不相同故曰動一竅而百竅相會也起一害人之事則天下害人者因其端以害人故曰舉一事而萬事有害也機者利害未分所以貴乎明忘其利害善用機者也險者設以待人所以貴乎平兩不相傷善設險者也功者用以建立所以貴乎無狀功成不居善建功者也法者用以平物所以貴乎無象事乎無事善立法者也能出刻畫者則知神非圖像木偶也可以名之爲大象者則知神本無象之謂也酒醴夫酒醴者迫之飮愈不飮恕之飮愈欲飮是故抑人者人抑之容人者人容之貸其死者樂其死貸其輸者樂其輸所以民盜君之德君盜民之力能知反覆之道者可以居兆民之職醴之美也迫之飲非不飲急則不能繼也恕之飲非欲飲緩則樂而能飲也此言天下之事迫之急則必有以不能繼之者寛緩之則有餘力矣是故𡨚人者而人亦𡨚之容人者而人亦容之能施其死而爲人者人亦樂其死能施其有以輸人者人亦樂其輸所以君修其德則民安於下而樂其業民力其業則君安於上以享其國則是民盜君之德以安生君盜民之力以安享也能知反覆相盜之道者則可以爲兆民之主矣恩賞侯者人所貴金者人所重眾人封公而得侯者不美眾人分玉而得金者不樂是故賞不可妄行恩不可妄施其當也由爲爭奪之漸其不當也卽爲亂亡之基故我自卑則賞不能大我自儉則恩不得奇厯觀亂亡之史皆驕侈恩賞之所以爲也侯者爵之尊眾之所貴也金者物之貴眾之所重也公爵尊於侯眾人封公而我封侯其心必不悅矣美玉貴於金眾人分玉而我得金其心必不樂矣如其分侯而得公分金而得玉以遂其欲則人悅而樂矣此常人之情天下古今之所同也是故賞不可以妄行恩不可以妄施也蓋以有賞則有爭有恩則有怨二者施之當則爲爭奪之由施之不當則爲亂亡之基有國者不可以不愼也是以聖人以謙卑待物以儉約奉身故必自卑雖賞之亦不大故必自儉雖恩之亦不異故無爭奪亂亡之事矣豈不見古之史乎厯載禍亂以喪其國者皆由驕縱奢侈其心志私恩重賞其勳戚以致然矣養民民不怨火而怨使之禁火民不怨盜而怨使之防盜是故濟民不如不濟愛民不如不愛天有雨露所以招其怨神受禱祝所以招其謗夫禁民火不如禁心火防人盜不如防己盜其養民也如是禁火恐民焚其居禁盜恐民亡其貨民之不謹間有被火盜者則訕而怨其立法之不善是故禁火濟民而民反怨之是不如不濟也禁盜愛民而民反訕之是不如不愛也以天之大也雨暘愆期而人猶憾之神之靈也災傷凶咎禱之不應而人猶謗之何况於人乎吁人惟知禁民焚居之火而不知禁焚身之火惟知禁竊財之盜而不禁竊神之盜者亦甚愚也能行此術養生養民兩得之矣仁化得一曠然無爲之謂道道能自守之謂德德生萬物之謂仁仁救安危之謂義義有去就之謂禮禮有通變之謂智智有誠實之謂信通而用之之謂聖道虛無也無以自守故授之以德德淸靜也無以自用故授之以仁仁用而萬物生萬物生必有安危故授之以義義濟安扶危必有臧否故授之以禮禮秉規持範必有凝滯故授之以智智通則多變故授之以信信者成萬物之道也妄盡心空無爲自然謂之道法其自然守正不失謂之德普利萬物慈而愛之謂之仁慈祥救物安危獲宜謂之義剛毅制事去就有序謂之禮規事範物變而通之謂之智權變得常眞實無僞謂之信五常備具通而化之謂之聖道者虛心無爲也道不自見故無以守之而守必以德德者淸靜無欲也德不自有故無以用之而用必以仁仁者無私也無私則德普如陽春發生物之生也必有安危之不一故以義而制其宜義者無偏也無偏則能濟安扶危而齊其物齊事物也必有臧否之不同故用禮以定其規範禮有執也執之則固滯不通必以智而通物情智無昧也無昧則心通而物理盡物理相通則無僞矣信無僞也無僞則眞實故能成天下之事也信屬土萬物生於土土性實萬理出於實故曰信者成萬物之道也五行道德者天地也五常者五行也仁發生之謂也故君於木義救難之謂也故君於金禮明白之謂也故君於火智變通之謂也故君於水信慤然之謂也故君於土仁不足則義濟之金伐木也義不足則禮濟之火伐金也禮不足則智濟之水伐火也智不足則信濟之土伐水也始則五常相濟之業終則五常相伐之道斯大化之往也道德者譬如天地人之本也五常者譬如五行人之用也仁爲五行之木如春發生仁和之心也義爲五行之金濟事救難剛决之心也禮爲五行之火照耀萬象慧照之心也智爲五行之水流行不息通變之心也信爲五行之土慤然堅固誠實之心也以剛决之心而濟事之宜則仁有所不足謂之金伐木也以慧照之心而燭事理則義有所不足謂之火伐金也以通變之心而分别物情則禮有所不足謂之水伐火也以誠實之心確然自守則智有所不足謂之土伐水也故知五行之始也相生以相濟其終也相伐以相刑此大化之中自然生尅之道也畋漁夫禽獸之於人何異有巢穴之居有夫婦之配有父子之性有生死之情烏反哺仁也隼憫胎義也蜂有君臣禮也羊跪乳智也雉不再接信也熟究其道五常百行無所不有也而教之爲網罟使之務佃漁且夫焚其巢穴非仁也奪其親愛非義也以斯爲享非禮也教民殘暴非智也使萬物懷疑非信也夫羶臰之慾不止殺害之機不已羽毛雖無言必狀我爲貪狼之與封豕鱗介雖無知必名我爲長鯨之與巨虺也胡爲自安焉得不恥吁直疑自古無君子人與禽獸鱗介均得天地之氣以生其形雖異其情未嘗不與人同彼之巢穴不異人之居也有牝牡之配不異人之夫婦也各子其子有父子之性也貪生怕死有生死之情也如慈烏之反哺其亦有仁也祝鳩之憫胎其亦有義也蜂蟻之君臣其亦有禮也羊羔之跪乳其亦有智也孤雉不再接其亦有信也以此道究而推之萬物之中五常百行無所不有也今也教民爲網罟務佃漁戕害物命者猶自戕其同類也若夫焚毁其巢穴是不仁之心也强奪其子母是不義之心也殺命以自奉非禮之心也教民爲殘暴是不智之心也使物畏死而懷疑是不信之心也五常俱失禽蟲之不若也而其貪嗜之心不止殺害之念不息羽毛之屬雖不能言其心其識不與人異其必以我爲貪狼無厭之徒封豕慘毒之輩鱗介之類雖不能如人之知其必以我爲吞舟之長鯨食象之巨虺也觀夫人之於物形類不同性命不異宿命因果從可知矣可不戒哉吁貪口味而樂甘肥殺他命以養己命於心胡得而安乎聞斯言之懇切於心焉得無愧乎吁哉自古及今守殺戒而不害物命者幾希極言好生不殺者寡故云自古無君子犧牲犧牲之享羔雁之薦古之禮也且古之君子非不知情之憂喜聲之哀樂能動天地能感鬼神刀杌前列則憂喜之情可知矣鷹犬齊至則哀樂之聲可知矣以是祭天地以是禱神明天地必不享苟享之必有咎神明必不歆苟歆之必有悔所以知神龍見喪風雲之象也鳳凰來失尊戴之象也麒麟出亡國土之象也觀我之義禽必不義也以彼爲祥禽必不祥也犧牲用以祭郊廟享鬼神羔雁用以結婚姻薦宗社皆古禮之儀也竊思古君子之制禮非其不知物情之憂喜聲氣之哀樂而遽用之又豈不知斯物也能動天地感鬼神蓋將以爲祭祀之儀耳是故當其刀杌之在前也但見其觳觫驚怖則憂喜之情可知矣當其鷹犬之齊至也但見其悲號懼死則哀樂之聲可知矣以是情而祭天地以是聲而薦神明其不歆享之意亦甚明矣苟其歆享則天地神明必厭其殺而悔咎隨之矣神龍出入風雲隨之而見之者則知其喪風雲之象也鳳凰麒麟聖王之祥瑞不世出也鳳凰來儀麒麟出世必有王者興則知其暴君失尊戴亡國土之象也反而察之我以物命祭郊廟結婚姻以爲義以爲祥而物之喪命失偶必以爲不義不祥矣此言不可用物命之意也神明且不享有道者肯爲之乎太和非兔狡獵狡也非民詐吏詐也愼勿怨盜賊盜賊惟我召愼勿怨叛亂叛亂禀我教不有和睦焉有仇讎不有賞勸焉得鬬爭是以大人無親無疎無愛無惡是謂太和人惟知兔狡爲難罟也不知其兔被獵者誘之狡耳人惟知民詐爲難治也不知其民被猾吏教其詐也刼人之財貨謂之盜賊也爲其有財以召其來也奪人之家國謂之叛亂也爲君不道以激其叛也上古之世民無忤逆安有和睦民無是非安有仇讎國無征伐安用賞勸及其後也始有和睦則有仇讎始有賞勸則有鬬爭是以大人視民如同胞故無親疎也不擇其賢愚故無愛惡也渾渾然與世爲一成天下之太和皥皥然與民相忘斯上古之風後世莫能復也海魚海魚有吐黑水上庇其身而遊者人因黑而漁之夫智者多屈辯者多辱明者多蔽勇者多死扄鐍固賊盗喜忌諱嚴敵國幸禁可以越者號也兵可以奪者符也蜀敗於山晉敗於馬夫大人之機道德仁義而已矣海魚遊吐黑水於上覆蔭其身使人莫見而漁人則從黑水以取之本爲全身而反喪其身此譬人以智術欺人而人亦以智術應之適足以爲取禍之由矣觀夫智者通權變明利害必致於窮故多屈辯者多分别好是非必致於爭故多辱明者尚文辭務名數知有所不盡故多蔽勇者恃拙力輕身命必致於殺傷故多死設外關堅環鍵以防賊盜賊盜因知多財貨心所欲故喜也隱忌諱嚴法令以禦敵國敵國因知其微弱不足畏故幸也關隘之禁必以號測其號則關可越也命將之兵必以符得其符則兵可奪也蜀敗於山者恃險輕敵故敗也晉敗於馬者恃馬慢人故敗也夫大人者不用智術不尚詐力不設險以防盜不忌諱以疑人無關鍵故人莫能越其禁無兵事故人莫能奪其符以道治天下以德化兆民以仁濟眾以義制事則四海宴然萬邦悅服而天下平故曰道德仁義而已矣神弓譽人者人譽之謗人者人謗之是以君子能罪已斯罪人也不報怨斯報怨也所謂神弓鬼矢不張而發不注而中天得之以假人人得之以假天下凡人莫不喜譽而惡謗譽人者人亦美而譽之謗人者人亦惡而毁之此常人之情天下古今所同也若夫君子則不然常以善待人人或以不善毁之不責於人惟咎已之善之所未至其毁之者久必自反而自罪矣是以君子能罪已斯足以罪人也君子常以恩施人人或以非義怨之不怨於人惟怨己之恩之所不實而怨之者久當自反而自怨矣是以君子不報怨斯足以報之也吁不罪人而人自罪之不報怨而人自怨之所以神弓鬼矢不見其張不見其注亦能中傷於人也竊知吾之性分之中本無恩本無怨所以不罪人不報怨以盡吾性分之所固有此天之假手於我故曰天得之以假人也我得此術而爲天下後世罪人報怨者之法式故曰人得之以假天下也救物救物而稱義者人不義之行惠而求報者人不報之民之情也讓之則多爭之則少就之則去避之則來與之則輕惜之則奪是以大義無狀大恩無象大義就不知者荷之大恩就不識者報之事有不濟必以義而救其宜不知其義也若自以爲義而稱揚則人鄙之而不義矣人有窘困必以惠而賙其急不求其報也若以此爲恩而望報則人薄之而不報矣凡民之情也如其讓之人服其德其得必多如其爭之人厭其貪其得必少就之則疑而去避之則信而來易與之人必親愛惜之人必奪勢必然也是故義於人不自以爲義謂之大義也恩及人不自以爲恩謂之大恩也無狀無象人莫之見也大義成猶不知其有義故人負荷其德也深大恩就猶不識其有恩故人思報其恩也厚書道心不疑乎手手不疑乎筆忘手筆然後知書之道和暢非巧也湻古非樸也柔弱非美也强梁非勇也神之所浴氣之所沐是故點䇿蓄血氣顧眄合情性無筆墨之跡無機智之狀無剛柔之容無馳騁之象若黃帝之道熙熙然君子之風穆穆然是故觀之者其心樂其神和其氣融其政太平其道無朕夫何故見山思靜見水思動見雲思變見石思貞人之常也心不疑乎手者神與手俱運也手不疑乎筆者手與筆俱轉也能忘手筆者有心得之妙也得於心者然後知書之道非手非筆也書之和緩暢快者非其工於巧也湻厚蒼古者非其工於樸也温柔婉弱者非其工於美也淸勁徤捷者非其工於勇也斯皆人之神氣發現於其中所以合人之情性也是故觀其書之點畫則知其人血氣之衰旺也觀其書之顧眄則知其人情性之巧拙也善觀書者觀書之神不在筆墨之跡也不在機智之巧也不在剛柔之形也不在馳騁之勢也似若聖王之道熙熙然光明也似若君子之風穆穆然深遠也作如是觀者其心樂而忘憂也其神和而愉悅也其氣融而和暢也如太平之善政也如無極之妙道也夫何故而其然乎以神會神如仁者見山思靜也智者見水思動也達者見雲思變也介者見石思貞也其思者心中所常有觸而感之則符其機矣鳳鴟鳳不知美鴟不知惡陶唐氏不知聖有苗氏不知暴使陶唐氏恃其聖非聖也有苗氏知其暴不暴也眾人皆能寫人之形而不能寫己之形皆能求人之惡而不能求己之惡皆能知人之禍而不能知己之禍是以大人聽我聲察我色候我形伺我氣然後知人之情僞物類之美惡性使之然不自知也如鳳之美鴟之惡其不自知之譬如唐堯聖君也其仁如天其智如神其不自知已爲聖也有苗暴君也其性剛烈其心慘毒亦不自知己爲暴也借使唐堯恃己爲聖則其心不化不得謂之聖也有苗知己暴而易其心則不得謂之暴也吁眾人皆能寫人之形而不能寫己之形者能見人而不能自見也皆能求人之惡而不能求己之惡者能知人而不能自知也皆能知人之禍而不能自知其禍者能察人而不能自察也是以有道之士知禍生於言也於言必愼所以聽我聲也是非生於見也於視必謹所以察我色也患生於身也於欲必戒所以候我形也嗔生於心也於忿必懲所以伺我氣也以我之心推以及人則人之情僞可知故無自欺之蔽也知人觀其文章則知其人貴賤焉觀其書篆則知其人情性焉聞其琴瑟則知其人道德焉聞其教令則知其人吉凶焉小人由是知唐堯之容湻湻然虞舜之容熙熙然伯禹之容蕩蕩然殷湯之容堂堂然文王之容巍巍然武王之容諤諤然仲尼之容皇皇然則天下之人可以自知其愚與賢文章者人之言言有美惡所以知其貴賤也書篆者人之用用有巧拙所以知其情性也琴瑟者人之樂樂有雅淫所以知其道德也教令者人之政政有優劣所以知其吉凶也由是知之想見古聖人之威儀也如陶唐之容湻湻然而渾厚也有虞之容熙熙然而光明也大禹之容蕩蕩然而寛大也成湯之容堂堂然而中正也周文之容巍巍然而尊高也周武之容諤諤然而正直也宣尼之容皇皇然而莊盛也以此觀之想見古之聖人有如是之儀容灼然於心目之間則天下之人可以自知其賢與愚而勉之耳螻蟻螻蟻之有君也一拳之宫與眾處之一塊之臺與眾臨之一粒之食與眾蓄之一蟲之肉與眾咂之一罪無疑與眾戮之故得心相通而後神相通神相通而後氣相通氣相通而後形相通故我病則眾病我痛則眾痛怨何由起叛何由始斯太古之化也螻蟻物之至微者也其亦有君長眾知所尊也一拳之穴爲之宫與眾處之一塊之土爲之臺與眾遊之獲一粒一蟲輒不私食必戮力運而蓄之然後偕眾咂之啖之其一有罪同眾戮之是故眾之不敢叛其君者爲其居處遊樂飲食而無私所以上下之情同而心相通也眾心相通則其神其氣其形而無所不通矣其一有病則如眾病其一有痛則如眾痛苦樂相均患難相同則怨無由而起有何爭鬬叛逆之事此太古以道化民之術釋老叢林之義也歌舞能歌者不能者聽之能舞者不能者觀之巧者不巧者辨之賢者不賢者任之夫養木者必將伐之待士者必將死之網之以冠冕釣之以爵祿若馬駕車輅貴不我得彘食糟糠肥不我有是以大人道不虛貴德不虛守貧有所倚進有所恃退有非樂寒賤而甘委棄世之能者常爲不能者用巧者常爲不巧者誚也其若能者愚之巧者拙之則不被人之所短矣能者勞而歌之舞之其不能者逸而聽之觀之巧者苦於成事事有臧否常爲不巧者之所誚也賢者勞於治政政有優劣常爲不賢者之所用也夫養木欲其材用材成必將伐之養士欲其輔國國難則必死之士之死於國者蓋其受冠冕之羅網也吞爵祿之釣餌也若夫駟馬之榮大輅之貴一息不來於我何有竊知受爵祿以殞其身者如豕食糟糠肥不自有也是以有道之士不貴其爵而貴其道不守其祿而守其德以無德爲貧以退身爲義退者非安於貧窮非樂於卑賤而甘自委自棄蓋將退身以進道安貧以成德也躑躅躑躅之酒烏喙之脯莨𦯰之膏冶葛之乳初噉之若芥再噉之若黍復噉之若丸又噉之若脯小人由是知强弩可以漸引巨鼎可以漸舉水火可以漸習虎兕可以漸侣逆者我所化辱者我所與不應者我所命不臣者我所取所以信柔馬不可馭漸賊不可禁得之以爲萬化之母躑躅不能進之貌躑躅之酒如鴆酒之類謂不能進之酒也烏喙豈能脯乎謂不能用之脯也莨𦯰郎毒子也冶葛毒草也莨𦯰之膏冶葛之乳謂不能食之膏乳也四者食之殺人人猶漸而服之初食之若芥之微漸食之若黍之少復食之若丸之大又食之若脯之多其豈虛言哉昔曹操食冶葛至一寸飲鴆酒至一杯是也此言天下之事生於漸不能爲者而人猶能爲之况可以爲可以能者豈不能之者乎由是知之千鈞之弩不可挽也可以漸引之千斤之鼎不可拔也可以漸舉之水火之險不可入也可以漸習之虎兕之惡不可親也可以漸侣之蓋言天下之事浸漸而行果能眞積力久而功自深心之所之神自應之神之爲之則無不能矣故知人所不能而能之者皆神之爲也是故人之所以逆我者由我之情有所不足以召彼之逆豈非我所化乎人之所以辱我者由我之言有所不當而激彼之辱豈非我所召乎人之不應我者由我之心有所不實而致其忤豈非我命之乎人之不臣伏者由我之德有所不道以致其叛豈非我所取乎是以信矣柔馬駑馬也不可馭者不能疾進也漸賊者家賊也不可禦者不知禁止也得斯理者可以達萬事之原爲萬化之母也止鬬止人之鬬者使其鬬抑人之忿者使其忿善救鬬者預其鬬善解忿者濟其忿是故心不可伏而伏之愈亂民不可理而理之愈怨水易動而自淸民易變而自平其道也在不逆民之情人之鬬忿皆起於心心有所激則必怒而鬬之心有所嗔則必恨而忿之當人之鬬也其心偏激而怒雖殺身不暇恤善解鬬者言其鬬之直其激而怒者或可止之如遽欲止其鬬其心愈激而鬬不解矣當人之忿也其心偏嗔而恨雖殞身不遑顧善解忿者言其忿之當其嗔而恨者或少抑之如强欲抑其忿其恨愈甚而忿不解矣是故吾心躁動之時也不可遽伏遽伏之心愈亂矣吾民農事之時也不可妄使妄使之民愈怨矣水之道鬱閉不流則不淸故必流動而水自淸也民之道虐政不變則不平故必易善而民自平也其於道也如不逆水之流而水自淸也不逆民之情而民自平也象符術有降萬物之藴毒者則交臂鈎指象爲之符是故若夭矯之勢者鱗之符若飛騰之勢者羽之符若偃蹇之勢者毛之符若拳跼之勢者介之符所以知拱折者人之符夫拱手者人必拱之折腰者人必折之而疏之爲萬象别之爲萬態教之蹈舞非蹈舞也使之禱祝非禱祝也我旣寡實彼亦多虛而責人之無情固無情也而罪禮之無驗固無驗也術有降萬物之蓄毒而害人者或交其臂或鈎其指變神以攝伏之則今搯訣步罡變神之術耳若屈折濳游之狀者鱗蟲之類也盤旋飛騰之狀者羽蟲之屬也仆跛偃蹇之狀者毛蟲之類也拳跼不伸之狀者介蟲之類也所以知其拱手折腰者人蟲之類也觀夫拱手者人亦拱而應之折腰者人亦折而應之蓋禮者本也應者符也人之善感物亦善應至於分之爲萬象之形别之爲萬態之狀無非一氣變化於其間皆自然而然也譬如蹈舞也教之蹈舞則非自然之蹈舞如禱祝也使之禱祝則非自然之禱祝我以不誠而感彼必虛而不應矣彼之不應不責已之不誠而反責人之無情則亦謬矣彼之無情也然由吾之情有所不足彼因之而無情矣彼之無禮不責已之不恭而反罪禮之無驗則亦誤矣禮之無驗也然由吾之恭有所不足彼因之而不應矣善惡爲惡者畏人識必有識者爲善者欲人知必有不知者是故人不識者謂之大惡人不知者謂之至善好行惠者恩不廣務奇特者功不大善博弈者志不遠文綺麗者名不久是以君子惟道是貴惟德是守所以能萬世不朽爲惡者言不露機動止陰險常畏人知其惡也其亦有能識之者爲善者言必中理動止光明常欲人知其善也其亦有不能知之者是故人能識之惡惡之小者也人所不能識之惡惡之大者也所謂大奸似忠是也人能知之善善之小者也人所不能知之善善之大者也盛德若愚是也以衣食賙人謂之惠也以德賙人其恩普矣以惠及人惠之用也有限故不廣也不偶於人謂之奇特以正輔世其功大矣以奇輔世奇之出也有數故不大也博弈者技之小志於小者足見其人志不遠也文章者道之華務於外者足見其人内不足也富貴者得志一時道德者流芳百世是以君子以道爲貴以德爲富終其身而謹守之身雖殁而道德恆存所以萬世不朽也食化七奪一日不食則憊二日不食則病三日不食則死民之事急無甚於食而王者奪其一卿士奪其一兵吏奪其一戰伐奪其一工藝奪其一商賈奪其一道釋之族奪其一稔亦奪其一儉亦奪其一所以蠶告終而服葛苎之衣稼云畢而飯橡櫟之實王者之刑理不平斯不平之甚也大人之道救不義斯不義之甚也而行切切之仁用慼慼之理其何以謝之哉民之一日不食則形虛而敗矣二日不食則形羸而病矣三日不食則形仆而死矣然民以食爲天食者人之先務不得不急今也天子以貢稅而奪其什之一卿士以祿廪而奪其一兵吏以糧餉而奪其一戰伐以軍需而奪其一工藝以器用而奪其一商賈以貨物而奪其一道釋以福田而奪其一民之勞苦於耕鋤之中僅得有數些𣺌之膏脂其什被奪其七而民安得不飢乎豐年奪之分也歉年猶不知恤必欲奪之則不免於飢窘憊病以致於死其有幸而不死者亦不免於窮困所以蠶告終而猶服粗雜葛苎之衣稼穯纔畢而遽食橡櫟藜藿之食其被奪之情貧窘之態槪可知矣王者以道治天下不刑而民畏而天下和平若以刑而理不平則有不平之甚者生焉是以大人以道治國以德化民則百姓親睦若以法而救不義則有不義之甚者出焉莫若無爲無事則民自安國自治矣其若馳心切切於刑政拘拘於禮法有心於治而民不治者君德有所不備也無德居於民上將何以謝天下後世哉巫像爲巫者鬼必附之設像者神必主之蓋樂所饗也戎羯之禮事母而不事父禽獸之情隨母而不隨父凡人之痛呼母而不呼父蓋乳哺之教也虎狼不過於嗜肉蛟龍不過於嗜血而人無所不嗜所以不足則鬬不與則叛皷天下之怨激烈士之忿食之道非細故也巫師事心於鬼所以鬼附之祝師設像事神所以神主之蓋以鬼神樂其祭饗所以附之主之也戎西夷羯北狄夷狄重母所以禮事母不禮其父也禽獸不知有父所以隨母不隨父也人之於痛苦呼母而不呼父者乳哺親之也虎狼嗜肉蛟龍嗜血而人則無所不嗜民之食也一旦不繼小則鬬而奪之甚則謀而叛之皷動天下之怨激起烈士之心戰伐相尋禍亂不息者皆因爲食而起所以知民之食非細故聚斂者不可不知也養馬養馬者主而牧之者親養子者母而乳之者親君臣非所比而比之者祿也子母非所愛而愛之者哺也駑馬本無知嬰兒本無機而知由此始機由此起所以有愛惡所以有彼此所以稔鬬爭而蓄奸詭養馬主也而馬不識其爲主而親牧者爲其養巳也生子者母也而子不知其爲母而親乳者爲其乳己也臣之所以親輔其君者蓋爲爵祿而親輔也子之所以親愛其母者蓋爲乳哺而親愛也駑馬鈍馬也不識己鈍何知之有也嬰兒方生也無有知識何機之有也由無知而生有知故曰知由此始也由無機而至有機故曰機由此起也爲其有知有機而喪其湻樸所以有愛惡之心生焉有彼此之心分焉有爭鬬之心興焉以至於懷姦蓄詭詐僞百端有不能以言盡者皆由有此識神而生出許多情妄也絲綸王取其絲吏取其綸王取其綸吏取其綍取之不已至於欺罔欺罔不已至於鞭撻鞭撻不已至於盜竊盜竊不已至於殺害殺害不已至於刑戮欺罔非民愛而聚斂者教之殺害非民願而鞭撻者訓之且夫火將逼而投於水知必不免且貴其緩虎將噬而投於谷知必不可或覬其生以斯爲類悲哉綸綬也綍亂絲也此言王取其一吏輙取其半之意也取之不已者言其斂之數則民財罄其必欺罔而不輸矣吏怒其不輸酷刑而鞭撻之民遭困而忿上之慘毒且因飢寒切身故不顧其廉恥而爲盜矣上又惡其爲盜捕而囚之甚則殛刑戮之吁民之欺罔其上者非其心之所愛由聚斂所逼也民之爲盜殺身者非其心之所願由鞭撻所迫也譬如火焚其身知死不免而投於水者貴其死之緩也遭虎之噬知不可活而投於谷者猶欲望其生也咦民受酷吏所逼爲盜以災其身而喪其命其情有甚於火之烈虎之惡以斯爲類而安於民之上者可不悲哉奢僭夫君子不肯告人以飢恥之甚也又不肯矜人以飽愧之甚也旣起人之恥愧必激人之怨咎食之害也如是而金籩玉豆食之飾也皷鍾戞石食之游也張組設繡食之惑也窮禽竭獸食之暴也滋味厚薄食之忿也貴賤精粗食之爭也慾之愈不止求之愈不已貧食愈不足富食愈不美所以奢僭由兹而起戰爭由兹而始能均其食者天下可以治飢寒者士之常以飢寒告人者卑屈無恥之賤士也温飽者人之分以温飽矜人者誇張無愧之小人也旣不能安其常守其分卑屈誇張於人而爲人之所恥人之所愧是激人之怨以咎己也籩豆竹器乘五穀也戞石擊磬也組帛可以爲冠也錦繡五色具也富貴者不恤民食之不足奢侈僭用鋪籩設豆以金玉飾其器也皷鐘戞石餚食而遊樂也張組鋪繡榮觀以惑其志也窮禽竭獸充滋味以暴物命也因滋味之美惡忿怒以責人也貴者精食賤者粗食起爭之端也窮奢極慾之心不止貪饕無厭之欲不歇貧窮者雖粗食尚自不足富貴者享精食猶厭不美所以激民之怨濟民之忿僭亂由兹而起矣故有盜賊刀兵戰伐之事而大亂天下者食之害也嗚呼在上者當容心於儉約均食於民則民自安而盜賊息天下烏有不治者燔骨嚼燔骨者燋唇爛舌不以爲痛飮醕酎者腸嘔胃不以爲苦饞嗜者猶忘於痛苦飢窘者必輕於性命痛苦可忘無所不欺性命可忘無所不爲是以王者以我欲求人之欲以我飢求人之飢我怒民必怒我怨民必怨能知其道者天下胡爲乎叛嗜味者咀嚼燔炙之骨致𤍠而燋唇爛舌不以爲痛而猶食之貪飮者痛飲醕酎之酒致醉而腸嘔胃不以爲苦而猶飲之咦貪嗜饞飲者猶自忘痛苦則知飢寒必死者必輕其性命矣故知貪饕不顧痛苦以欺其身者何事不可欺也必死不顧性命以輕其身者何事不可爲也是以有道之君省己知民之情以我之慾則知人之慾不異於我矣以我之飢則知人之飢有甚於我矣我以不道怒其民而民必以不仁而怒我矣我以不德怨其民而民亦以不義而怨我矣夫我無欲而民自富我不嗜飲民不饑窘我不困民民必不怨則上下之情通天下烏有叛我者食迷民有嗜食而飽死者有婪食而鯁死者有感食而義死者有辱食而憤死者有爭食而鬬死者人或笑之殊不知官所以務祿祿所以務食賈所以務財財所以務食而官以矯佞讒讟而律死者賈以波濤江海而溺死者而不知所務之端不知得死之由而遷怒於流輩歸咎於江海食之迷也爲食喪身謂之食迷迷於食而死者五有嗜食過多而飽死者有貪食堅硬而鯁死者有感食之義以死報人者有爲食受辱憤死者有因食爭攘鬬死者舉世皆笑之爲食喪身殊不知食者養命之原人之先務不得不爭也如仕宦以祿爲先務祿者食之務也商賈以財爲先務財亦食之務也仕宦爲食橫生姦佞之心讒謗其君犯律以罪死商賈爲食波濤江海沉舟以溺死而不知爲食以利祿爲務之端而得喪身之由一旦死之仕宦則歸怨於薦舉之同類商賈則歸怨於江海之波濤而不知怨爲食以求利祿致死之由豈非食之迷乎戰欲食之欲也思鹽梅之狀則輒有所吐而不能禁見盤餚之盛則若有所吞而不能遏飢思啖牛渴思飲海故慾之於人也如賊人之於慾也如戰當戰之時錦繡珠玉不足爲富冠冕旌旗不足爲貴金石絲竹不聞其音宫室臺榭不見其麗况民腹常餒民情常迫而諭以仁義其可信乎講以刑政其可畏乎思鹽梅之酸輒津生而有所嚥欲其不嚥其必不能禁也見餚饌之美輒欲之而有所吞欲其不吞其必不能止也飢者思啖牛欲食之多也渴者思飲海欲飲之多也慾之於人如盜賊之竊物人之於慾如交戰之必克當其戰之時也憤不顧身雖有錦繡珠玉之富冠冕旌旗之貴不足動其心雖有金石絲竹之音亦不聞其聲宫室臺榭之美亦不見其麗惟知有戰以求其勝如飢渴之求飲食也是故當民安居温飽之時也諭之以仁義勸之以忠信而民信之示之以刑罰勉之以罪福而民畏之當民顚沛飢困之時也諭之以仁義忠信而民信乎示之以刑法罪福而民畏乎食之害也如是膠竿執膠竿捕黃雀黃雀從而噪之捧盤飱亯烏鳥烏鳥從而告之是知至暴者無所不異至食者無所不同故蛇豕可以友而羣虎兕可以狎而馴四夷可以率而賓異族猶若此况復人之人執粘竿捕黃雀者黃雀畏其害己則羣噪而驚之捧盂澆食以享烏鳥者烏鳥知其食已則歡呼而迎之由是而知物之性矣能盡已之性者則能盡人盡物之性也是故蓄心害物物亦起異心而逃之忘機同物物亦忘機而親之此足以見盡已之妙故曰至暴者無所不異至食者無所不同也是故蛇豕不可親也可以羣而友之兕虎不可近也可以狎而伏之夷狄不可致也可使來而貢之蓋吾無異心不害物而物所以親附也如海翁之戲鷗孫眞人之伏虎是也吁異類之心尙相若况同類之人而不能感之者乎庚辛庚氏宂池構竹爲凭檻登之者其聲䇿䇿焉辛氏宂池構木爲凭檻登之者其聲堂堂焉二氏俱牧魚於池中每凭檻投餌魚必踴躍而出他日但聞策䇿堂堂之聲不投餌亦踴躍而出則是庚氏之魚可名策䇿辛氏之魚可名堂堂食之化也庚氏辛氏蓋寓言也宂深也策䇿竹之聲堂堂木聲也庚氏者掘地爲池以竹爲凭檻登其池擊其檻其聲䇿䇿焉辛氏亦掘地爲池以木爲凭檻臨其池擊其檻其聲堂堂焉二氏均有池養魚於其中每登池凭檻擊之則䇿策堂堂之聲以投餌魚聞聲知其飼巳則屈折踴躍而出食之他日但聞䇿䇿堂堂之聲雖不投餌亦踴躍而出者食之化也興亡瘡者人之痛火者人之急而民喻饑謂之瘡比餓謂之火蓋情有所切也夫鮑魚與腐屍無異鱁鮧與足垢無殊而人常食之飽猶若是饑則可知苟其饑也無所不食苟其迫也無所不爲斯所以爲興亡之機瘡痍人之痛苦風火人之逼迫食者人情重務也民之無食數日輒死則饑餓之急有甚於瘡火之急也鱁鮧魚名臭亦可食鯧鱺之類是也二物之臭與腐屍不異足垢無殊而人不以爲穢而食之此足以知人之食欲也以温飽之時猶若不顧其腐臭則饑困之時其貪饕無厭之情又可知矣故知人之饑則無物不食矣人之急無所不爲矣嗟夫民之情也有食無事興之兆也無食多事亡之機也雀鼠人所以惡雀鼠者謂其有攘竊之行雀鼠所以疑人者謂其懷盗賊之心夫上以食而辱下下以食而欺上上不得不惡下下不得不疑上各有所切也夫剜其肌啖其肉不得不哭扼其喉奪其哺不得不怒民之瘠也由剜其肌民之餒也由奪其哺鳴呼惜哉雀之攘鼠之竊人所當惡也蓋以雀鼠之姦懷盜賊之心行止疑人故人惡而怒之也夫上之歛於下也輸之緩輒以刑法而辱其下民被奪之數也必怨而怒之逃賦役以欺其上嗚呼民不奉法而上不得不惡之上不寛恤而民不得不疑之則是上下之情各有所切也是故民之所以欺罔其上者皆由上之崇宫室高臺榭衣文綺嗜美味厚斂以剜民之肌啖民之肉民受其痛不得不哭也扼民之吭奪民之食不得不怒也嗚呼剝民之膏脂是以瘠也奪民之口食是以餒也殊不知民者國之根本豈有根本不固而枝條暢茂也惑於利而忘其家國也惜哉無爲牛可使之駕馬可使之負犬可使之守鷹可使之擊蓋食有所感也獮猴可使之舞鸚鵡可使之語鴟鳶可使之死鬬螻蟻可使之合戰蓋食有所教也魚可使之吞鈎虎可使之入陷雁可使之觸網敵國可使之自援蓋食有所利也天地可使之交泰神明可使之掖衞高尚可使之屈折夷狄可使之委伏蓋食有所奉也故自天子至於庶人曁乎萬族皆可以食而通之我服布袍則民自煖我食葵藿則民自飽善用其道者可以肩無爲之化牛之駕馬之負犬之守鷹之擊皆以食養之而感其然也獮猴之戲鸚鵡之言鴟鳶之鬬螻蟻之戰皆可以食誘之而教其然也魚之吞鈎虎之入陷雁之觸網敵之自援皆以食餌之使之然也天地之交泰神明之掖衞高尚之屈折夷狄之委伏皆以食奉之使之然也由是知之食之道也大矣上自天子之貴下及兆民之眾庶類萬族皆以食而通其情故知民之温飽飢寒者悉自我始我其奢侈民必飢寒我尚儉約民必富庶我服布素民必温煖我食葵藿民必安飽善用其道者不待法令而民自治可以挽回太古之湻風復無爲之化也王者獵食者母分乳者子全生者子觸網者母母不知子之所累子不知母之所苦王者衣纓之費盤餚之直𡻕不過乎百萬而封人之土地與人之富貴百萬之百萬如咂王之肌如飮王之血樂在於下怨在於上利歸於眾咎歸於王夫不自貴天下安敢貴不自富天下安敢富以網罟取獸謂之獵也其母護子而罹網獵食其母而養其子子得全活母被子累而死矣王者戴冠冕披衮袍盤餚宴亯之費一𡻕之中所費者不過百萬而已而其宗室之繁勲戚之庶封爵祿列土地榮宫室高臺階廣苑囿珍禽獸華衣冠美盤饌列絲竹具鐘磬與人之富貴縻費百萬之百萬也如咂王之肌膚飲王之膏血而王迷弗知也吁其樂者在宗勛其所怨者必歸於王也是故宗勳亯榮祿而王受怨咎其亦有所自耳蓋由王好奢侈誇張其富貴而宗勳翕然從風而奢費矣如若王好儉約而省費則宗勳亦淡然從化而儉約天下安敢浪費哉鴟鳶有智者憫鴟鳶之擊腐鼠嗟螻蟻之駕斃蟲謂其爲蟲不若爲人殊不知當歉𡻕則爭臭斃之屍値嚴圍則食父子之肉斯豺狼之所不忍爲而人爲之則其爲人不若爲蟲是知君無食必不仁臣無食必不義士無食必不禮民無食必不智萬類無食必不信是以食爲五常之本五常爲食之末苟王者能均其衣能讓其食則黔黎相悅仁之至也父子相愛義之至也飢飽相讓禮之至也進退相得智之至也許諾相從信之至也教之善也在於食教之不善也在於食其物甚卑其用甚尊其名尤細其化尤大是謂無價之寶鴟鳶食腐鼠螻蟻駕斃蟲智者傷其食陋而嗟憫之謂禽蟲不若人甘食美用也殊不知人當歉年無食之際亦嘗爭食臭腐之屍又不知人䧟重圍不出之際亦嘗易食父子之肉嗟夫以虎狼之惡尙不啖子而人猶啖之虎狼不忍爲而人忍爲之故知人之心有甚於虎狼禽蟲者矣由是知之食者五常之本民之天也天固不可逃民之食一日不可無也是故君一日無食必不仁以剥其民臣一日無食必不義以欺其君士一日無食必失禮以亂其序民一日無食必不智以喪其心萬類一日無食必不信以蠧其物如是則五常之道廢矣故曰食者五常之本五常者食之末也王者不違農時去奢省費薄食輕徭則是均其衣讓其食矣民食有餘則仁義興自然黔黎相悅父子相愛飢飽相讓進退相得許諾相從五常攸叙風俗攸美者皆食之化也吁民有食則五常興無食則五常廢食之爲物也甚微實生民之司命故其用也甚貴食之名也雖小爲人生之至要故其化也甚大由是知之民之要者莫如食豈非無價之寶乎儉化太平夫水火常用之物用之不得其道以至於敗家蓋失於不謹也飲饌常食之物食之不得其道以至於亡身蓋失於不節也夫禮失於奢樂失於淫奢淫若水去不復返議欲救之莫過乎儉儉者均食之道也食均則仁義生仁義生則禮樂序禮樂序則民不怨民不怨則神不怒太平之業也水之洗灌火之爨燎烹飪之利民須不可一日無之常用之物也水不䟽其源以通其流火不曲其突以遠其薪是用之不得其道必有焚蕩其業傾其家者蓋其失之於不謹也飲饌者常食之物也雖能養人亦能害人如飲酒過多必亂性爽口物多終作疾是用之不得其道必有傷損形軀殞其命者蓋其失之於不節也夫禮貴簡樂尙和若以奢泰之儀而爲禮之恭以滛佚之音而爲樂之和蓋其不知禮樂之本是以失正而流於奢滛也人之溺於奢淫如水之流蕩趨下而不知反議者欲以救其失莫若儉約之術耳故知儉者均食之道也人君一旦儉約奉身則百司莫不翕然省費故其歛也輕則民之食有餘矣是故民之安食而從教自然父子慈孝君臣愛敬沛沛然仁義興禮樂序上下相孚以洽雍熙之化又何怨之有也人心和平神人歆饗以和召和故無水火災傷之咎遂成太平之業儉之致也權衡服絺綌者不寒而衣之布帛愈寒食藜藿者不飢而飯之黍稷愈飢是故我之情也不可不慮民之心也不可不防凡民之心見負石者則樂於負塗見負塗者則樂於負蒭飢寒無實狀輕重無必然蓋豐儉相形彼我相平我心重則民心重我務輕則民務輕能至於儉者可以與民爲權衡服絺綌不寒食藜藿不飢者蓋其飢寒所常有故能耐其飢寒也衣布帛者愈寒飯黍稷者愈飢蓋其飢寒未嘗有是以易爲飢寒也然人之情也惡飢寒而欲温飽人之心也叛殘暴而歸仁義以我之温飽不可不慮民之飢寒也民受飢寒未必無怨怨必叛亦不可以不防也凡民之情莫不樂輕避重趨逸憚勞但見其負石之重者則願樂於負塗之輕負戴於塗者則願樂於負蒭之徐避重趨輕天下同情有國者不可以不知也常以此心而推之則民無飢寒無重役而得其温飽故曰飢寒無實狀輕重無必然也豐年徵全賦歉年蠲其半則彼我均平上下相安也其若上好奢必厚歛於民民之困重國必亂矣上好儉必薄歛於民民務輕國必安矣能以儉約而爲治者則知民之輕重豈非民之權衡乎禮道禮貴於盛儉貴於不盛禮貴於備儉貴於不備禮貴於簮紱儉貴於布素禮貴於炳煥儉貴於寂寞富而富之愈不樂貴而貴之愈不美賞而賞之愈不足愛而愛之愈不敬金玉者富之常官爵者貴之常渴飲則甘飢食則香所以能知非禮者用以嘉會所以貴乎盛貴乎備也儉者用以守約所以貴乎不盛貴乎不備也簮冠垂紱炳然煥然郁郁然飾之於外禮之貴也素冠布袍寂然寞然泠泠然約之於身儉之貴也貧者富之則樂賤者貴之則美無功賞之則足無親愛之則敬金玉者富所有官爵者貴常分若以金玉官爵而與富貴之士其必不以爲樂爲美也若以金玉官爵而與貧困之士其必以爲至樂至美也是故渴飲則甘飢食則香是以君子能知其非心有所主而不爲行跡所遷志有所守而不爲富貴所惑所以不失義不離道事物莫能累情欲莫能熏惟知有正隨寓而安故不爲金玉官爵之所惑也食象覩食象者食牛不足覩戴冕者戴冠不足不足有所自不亷有所始是知王好奢則臣不足臣好奢則士不足士好奢則民不足民好奢則天下不足夫天下之物十之王好一民亦好一王好五民亦好五王好十民亦好十以十論之則是十家爲一家十國爲一國十天下爲一天下何不弊之有此章言人君好大而不肯謙下好奢而不肯儉約之意也觀夫食象之大者與牛食之則不足垂旒而王者與冠戴之爲卿士必不爲蓋其平日侈大有所自故不能隨寓而安也由是知之王好奢則臣亦好奢士亦好奢民亦好奢以致於天下之人皆好奢窮奢極侈而縻費其用不足則相奪而禍亂隨之者皆人君好侈大務驕奢致之然也鳴呼君猶形也民猶影也形動而影隨之上之所好下亦好之上之所奪下亦奪之上下相奪天下烏得不亂斯國家之弊爲政者不可以不知也民情其夫好飲酒者其妻必貧其子好臂鷹者其家必困剰養一僕日飯三甌𡻕計千甌以一𡻕計之可享千兵王者𡻕率是享則必告勞而聚怨病在於增不在於損王駕牛車民驕於行王居土陛民恥於平杜之於漸化之於儉所以見葛藟不足者則樂然服布素之衣見窳杯而食者則欣然用陶匏之器民之情也夫好飲酒且荒其治生其妻安得不窘乎子好臂鷹因廢其田業其家焉得不困乎以養僕之剰食日三甌積𡻕計之其食可以享千兵若王者𡻕斂以享士則招民之怨而爲治道之病也王若以徹法行之則民賦輕而怨無矣故曰病在於增不在於損也王者出入駕大車以廣後從尊居土陛而列侍衞若不節用以恤其民其必驕於行恥於平怨而思叛矣是以有道之君不法外以斂民不奢泰以驕民不峻刑以酷民者恐激民之怨也若以節儉自持而民亦從化爲儉也故見其服葛藟之衣則願爲服布素見其用窳杯爲食者欣然樂用陶匏上行下效天下皆知儉矣慳號世有慳號者人以爲大辱殊不知始得爲純儉之道也於巳無所與於民無所取我耕我食我蠶我衣妻子不寒婢僕不飢人不怨之神不罪之故一人知儉則一家富王者知儉則天下富舉世之人有慳吝之名必自恥之以爲不美之號殊不知慳者儉之基也儉者不輕廢是謂於已無所與也不貪財是謂於民無所取也耕鋤而爲我食蠶桑而爲我衣養親有菽水之歡妻孥無飢寒之苦無願無求惟安於分不取怨不招愆所以人不怨之神不罪之安其居守其業樂天爵以終天年皆由慳也儉也而致然也故一人知儉則一家無不儉故富也王者知儉則天下人皆知儉所以天下富也君民君之於民異名而同愛君樂馳騁民亦樂之君喜聲色民亦喜之君好珠玉民亦好之君嗜滋味民亦嗜之其民則異其愛則同所以服布素者愛士之簮組服士之簮組者愛公卿之劔佩服公卿之劔佩者愛王者之冕旒是故王者居兆民所憂之地不得不慮也况金根玉輅奪其貨高臺崇榭奪其力是賈民之怨是教民之愛所以積薪聚米一𡻕之計而易金換玉一日之費不得不困不得不儉君貴民賤其分雖殊其愛同矣君樂鞍馬之馳騁而民亦樂之君喜耳目之聲色而民亦喜之君好珠玉之珍玩而民亦好之君嗜珍饈之滋味而民亦嗜之故知人之愛欲之心貴賤同得布素者民之常其必有愛士簮組之美簮組者士之常其必愛公卿劔佩之榮劔佩者公卿之常其必愛王者冕旒之貴由是知之王者居高履危所憂之地不可以不慮也今也奪民之財而以金玉飾車輅奪民之力而以材木崇臺榭是皆賈民之怨教民之愛也是故人一日積薪一束聚米一升一𡻕計之其薪如山其米百斛足以易金換玉者儉之致也雖然日食之用所當費也而𡻕有豐歉不以儉節之其困隨至故曰民之於家不得不儉也乳童乳童拱手誰敢戲之豈在黼黻也牧䜿折腰誰敢背之豈在乎刑政也有賓主之敬則黍雞可以爲大享豈在乎簫韶也有柔淑之德則荆苎可以行婦道豈在乎組繡也而王者之制設溝隍以禦之陳棨㦸以衞之蓄粟帛以養之張欄檻以遠之蓋有機於民不得不藏有私於已不得不防夫能張儉之機民自不欺用儉之私我自不疑夫儉者可以爲大人之師乳童之幼也若能拱手如禮孰敢戲而輕之豈在黼黻之盛然後爲禮也牧䜿之賤也若其曲躬如法孰敢背而慢之豈在刑政之嚴然後爲法也且以賓主交會之際雍容整肅雖雞黍之飡亦不異乎太牢之享豈在奏簫韶歌鹿鳴然後爲宴大賓也有柔和婉淑之姿端莊貞靜雖荆苧之賤亦不異乎后𡚱之配豈在戴紋組服錦繡然後爲合大婚也王都之制也深溝高隍以禦之陳棨列㦸以衞之腴粟豐帛以養之張欄廣檻以圍之嚴密周護無所不至者爲其有富貴之私懼人竊之故不得不嚴密而防之也若夫薄富貴尙儉約則無自私之累盗賊不能欺我矣我之疑去其心自虛故曰儉者可以爲大人之師化柄儉於聽可以養虛儉於視可以養神儉於言可以養氣儉於私可以獲富儉於公可以保貴儉於門闥可以無盗賊儉於環衞可以無叛亂儉於職官可以無姦佞儉於嬪嬙可以保夀命儉於心可以出生死是故儉可以爲萬化之柄儉者如太上之言嗇不輕用之意也是故耳不妄聽以養其虛目不妄視以養其神口不妄言以養其氣財不妄費以致其富祿不妄受以保其貴環堵蕭然足以絶盜屏棄富貴足以無叛不寵職官足以無姦不近女色足以延年妄心不起足以出生死由是知之儉者人道之要萬化之柄也御一王者皆知御一可以治天下也而不知孰謂之一夫萬道皆有一仁亦有一義亦有一禮亦有一智亦有一信亦有一一能貫五五能宗一能得一者天下可以治其道蓋簡而出自簡之其言非玄而人自玄之是故終迷其要竟惑其妙所以議守一之道莫過乎儉儉之所律則仁不蕩義不亂禮不奢智不變信不惑故心有所主而用有所本而民有所賴易曰天下殊途而同歸百慮而一致孔子曰吾道一以貫之蓋一者萬法之宗道之本也人君精一則天下可治而不知其孰謂之一一者虛而靈寂而神無而有散之一切處斂之在方寸終日相隨而人莫識萬道之中五常之德各有一也故知一者五常之中五常者一之裔也豈但五常而天下之萬善萬行雖然紛紜交錯莫不各有當然者皆一也一者心之正也得其一足以治天下也一之爲道簡而有要故足以當繁也一之爲言易而不玄人妄以爲玄也若以一爲玄則是不識一之面目而迷其要竟惑於妙也所以師眞思議守一之道者如上章所謂無所不儉是也知儉則心虛虛者一之道也若以儉道律心則終身用之無所不足矣儉以治民則不蕩儉以制事則不亂儉以嘉會則不奢儉以自守則不變儉以應世則不惑善行此道者蓋其心有所主是以應用不竭也鳴呼儉之義大矣哉得之者其心虛其守約雖一日萬機常若無事虛心順理以應之則無所不當當則不礙於理理明事遂兆民頼之儉之至矣三皇君儉則臣知足臣儉則士知足士儉則民知足民儉則天下知足天下知足所以無貪財無競名無姦蠧無欺罔無矯佞是故禮樂自生刑政自甯溝壘自平甲兵自停逰蕩自耕所以三皇之化行孔子曰未有上好仁而下不好義者也上行下效如影隨形如漢文帝尙樸素而海内富庶天下古今稱之則知未有上好儉而其下有不足者矣是故君好儉則無貪酷虐民之臣臣好儉則無競名倖進之士士好儉則無姦蠧犯分之民民好儉則無欺罔叛逆之事自天子以至於庶人皆以儉養其德而立其身皆以儉成其業而致其富自然禮義生獄訟息雨順風調而溝壘自平天下宴然而甲兵無有逰蕩慚愧而浪子自耕俗樸人純民安俗泰豈非三皇之化乎天牧奢者三𡻕之計一𡻕之用儉者一𡻕之計三𡻕之用至奢者猶不足至儉者尙有餘奢者富不足儉者貧有餘奢者心常貧儉者心常富奢者好親人所以多過儉者能遠人所以寡過奢者事君必有所辱儉者事君必保其祿奢者多憂儉者多福能終其儉者可以爲天下之牧奢者三𡻕謀之一𡻕之用至奢猶不足儉者一𡻕謀之三𡻕之用至儉者尙有餘此足以見奢儉者貧富憂樂禍福之不同也奢者好華美雖富亦不足儉者尙樸素雖貧亦有餘奢者常苦不足用故其心常困儉者怡然有餘裕故其心常泰奢者好親人所以招非故多過儉者好恬退所以省事故寡過奢者事君必貪濫所以多辱儉者事君必亷謹所以保祿奢者多事必多憂儉者淸淡必多福若能以儉道自守終其身而不衰者故可爲人之司牧雕籠懸雕籠事玉粒養黃雀黃雀終不樂垂禮樂設賞罰教生民生民終不泰夫心不可安而自安之道不可守而自守之民不可化而自化之所以儉於臺榭則民力有餘儉於寶貨則民財有餘儉於戰伐則民時有餘不與之猶與之也不取之猶取之也海伯亡魚不出於海國君亡馬不出於國黃雀入樊籠如人在縲絏雖雕籠居之玉粒食之其心終不樂也凡民之情好安靜而惡煩亂若以多事擾民雖有禮樂之美賞罰之公其心終不泰也憶昔古之聖王治天下與民相忘賦役有定數自賦役之外毫無千擾而民心自安民道自守民風自化豈在禮樂賞罰刑政而化之也夫禮樂賞罰刑政者有爲之道未能與民相忘所以民心不泰莫若以儉樸教化其民爲愈也由是知之人君不以臺榭爲務則民力有餘不以寶貨爲貴則民財有餘不以戰伐妨民則民時有餘不用刑政而民自安不待教令而民自化雖不與之猶與之也苟若高臺榭以勞民好寶貨以斂民好兵事以妨民雖不取之猶取之也師眞又恐學人費人事以求治道故曰海伯亡魚不出於海國君亡馬不出於國者言禮樂刑政雖然有爲但順其理之自然而行之雖爲猶無爲也豈可棄絶人事然後爲道哉禮要夫禮者道出於君而君猶不知事出於職而職由不明儒者棲山林敬師友窮禮樂講本末曁乎見羽葆車輅之狀鐘鼓簫韶之作則矍然若鹿怡然若豕若醉於酒若溺於水莫知道之本莫窮禮之旨謂弓爲弧則民不知矣謂馬爲駟則民莫信矣所以數亂於多不亂於少禮惑於大不惑於小能師於儉者可以得其要禮樂自天子出故曰道出於君禮尙文所以滅質若執禮以煩民不明道之君也政出於臣事妨民所以招怨若多事以擾民不明理之臣也儒者棲隱山林敬師親友窮道德之原探禮樂之緖究本以知末追往以知來斯天下之博儒也暨乎見羽葆車輅之制鐘皷簫韶之作急視之若鹿之無知和悅若豕之無識昬昬然醉於酒懵懵然溺於水則向之所窮道德之原所探禮樂之緖莫知其本莫究其旨以角弓爲木弓則民不知矣以一馬爲駟馬則民不信矣然後始知天下之義理無窮得其一而遺其二得於此而失於彼然非見聞之所能盡愈窮愈有所以數亂於多不亂於少也禮者文滅質學者博溺心所以爲惑之大也能以儉約爲師者不尙浮華直述其事以簡而當其理則得禮道之要也淸靜奢者好動儉者好靜奢者好難儉者好易奢者好繁儉者好簡奢者好逸樂儉者好恬淡有得一器畢生無破者有掛一裘十年不弊者斯人也可以親百姓可以司粟帛可以掌符璽可以進淸靜之道奢者好事故多動儉者簡緣故多靜奢者尙侈事多雜儉者守約事多易奢者好謀爲故煩瑣儉者好安靜故簡當奢者心驕泰所以好逸樂儉者心退怯所以好恬淡如有用一器終其身而不破者掛一裘十餘年而不弊者斯人也儉之至矣儉於外者必能堅乎内也以此儉而治天下則百姓親睦以此儉而司粟帛則倉廩豐盈以此儉而掌符璽則天下平治以此儉而進道則淸靜無爲斯儉也何所往而不利經云淸靜爲天下正是也損益夫仁不儉有不仁義不儉有不義禮不儉有非禮智不儉有無智信不儉有不信所以知儉爲五常之本五常爲儉之末夫禮者益之道也儉者損之道也益者損之旨損者益之理理過則淫儉過則樸自古及今未有亡於儉者也仁者不儉其仁其必有以不能繼之之者故有所不仁義者不悋其義其必有以不能續之之者故有所不義禮者不嗇其禮其必有以不能紹之之者故有所非禮智者不慳其智其必有以不能襲之之者故有所不智信者不惜其信其必有以不能接之之者故有所不信故知儉者爲五常之本五常者儉之末也禮尙奢益之道也儉尙約損之道也益者損之旨滿招損也損者益之理謙受益也禮貴乎奢奢必淫儉貴乎簡簡則樸自古及今多有亡於奢淫未有亡於儉樸者也解惑謙者人所尊儉者人所寶使之謙必不謙使之儉必不儉我謙則民自謙我儉則民自儉機在此不在彼柄在君不在人惡行之者惑是故爲之文謙者有而不居所以養德故人尊之儉者嗇而不用所以近道故人寶之若我不謙使人謙之彼必憤而不謙矣若我不儉使人儉之彼必激而不儉矣若我好謙則民自然卑退矣我好儉則民自然簡約矣所以知治國教民必自我始故曰機在此不在彼柄在君不在民也師眞於終篇發之曰惡行之者惑是故爲之文此亦一時傷世迷惑之語也蓋言當世之人尙文滅質好尊高而恥謙下務奢泰而畧儉樸逐末以遺本迷外以失内喪心昧性滔滔然如水之流下而不知返故著此化書以曉斯世覺斯民破斯惑也
