body:
  text: 化書化書新聲序一淸抱樗櫟之姿好無爲之業何異以秋蚊之力慕沖霄井蛙浮滄溟駑騫逐玄龍醯雞追飛鳳然非不自量願學之心有所不能已也憶昔初見紫霄譚眞人化書伏讀之茫然莫能測其指歸心竊慕之而意有所疑於時又無可諮者數嘗廢卷太息近訪遠參幾三十餘年雖請益於名卿碩儒緇流方士間亦有所指示而其造微自得者少臆斷妄說者多終不能融通其說也萬厯壬辰自京師奏皇太后請武當山瓊臺中觀道藏經囬止三公岩予見其地山環水繞室靜岩高鳥獸不驚樵採不到眞修行之窟宅且多明經鍊養之士是以徘徊不能去也大眾推管常住充都管隆冬稍暇輙玩化書一淸每味之飄然若乘舟於大海之中寥寥然莫能見其邊際泠乎如臨不測之淵冥冥然莫能見其蹤跡森乎似多寶之藏而無物不有寂乎如溟涬之中莫見其垠不動如山岳變化如浮雲淸若秋水茂若靑松皎如明鏡難知如陰誠造化之奧也一淸愛之誦之玩之索之而有得焉孔子云惟天下至誠爲能化故知化者至誠之道陶鑄萬有總括眾妙眞人以是名其書其旨深矣其篇六一曰道二曰術三曰德四曰仁五曰食六曰儉道者虛靜之宗天地萬物之本也術者變化玄技大道之用也道不自見故必著而爲德德者道之容也德不自有故必濟之以仁仁者德之上也仁無私也故能均民之食食者民之天也食必節用故必守之以儉儉者無所不有無所不化也儉之於食則不饑儉之於仁則不蕩儉之於德則無心儉之於術則不測儉之於道則無爲儉之於身則淸靜儉之於心則復性儉之於事則簡要儉之於物則富有儉之於言則養氣儉之於目則全神儉之於耳則保精故曰儉者五常之本民之權衡萬化之柄大人之師也能師於儉者得道之要能終其儉者天下之收此化書之畧也噫何如是之簡要何如是之直捷何如此之精詳何如此之廣大豈非窮神知化體物知身者之言乎豈非彌綸天地出入造化者之言乎豈非獨立物表遺世羽化者之言乎一淸今也爲之註粗舉無爲之理以達大化之源以洩夫千餘載無釋之旨故曰化書新聲是爲敘先天風雷侍者岫雲王一淸敘
